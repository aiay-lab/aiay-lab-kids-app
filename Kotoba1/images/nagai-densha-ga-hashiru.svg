  <!-- レール2本 -->
  <rect x="0" y="239" width="300" height="3" fill="#bdbdbd" rx="1"/>
  <rect x="0" y="244" width="300" height="3" fill="#bdbdbd" rx="1"/>

  <!-- ===== 電車グループ（5両編成） ===== -->
  <!-- 車体 y=205〜239、車輪 cy=247 r=9 -->
  <g class="train">

    <!-- パンタグラフ（3両目上に固定） -->
    <line x1="198" y1="205" x2="192" y2="194" stroke="#616161" stroke-width="1.8"/>
    <line x1="198" y1="205" x2="204" y2="194" stroke="#616161" stroke-width="1.8"/>
    <line x1="192" y1="194" x2="204" y2="194" stroke="#616161" stroke-width="2"/>

    <!-- ▶ 1両目（先頭） x=0〜76 -->
