    <rect x="0"   y="239" width="9" height="7" rx="1"/>
    <rect x="15"  y="239" width="9" height="7" rx="1"/>
    <rect x="30"  y="239" width="9" height="7" rx="1"/>
    <rect x="45"  y="239" width="9" height="7" rx="1"/>
    <rect x="60"  y="239" width="9" height="7" rx="1"/>
    <rect x="75"  y="239" width="9" height="7" rx="1"/>
    <rect x="90"  y="239" width="9" height="7" rx="1"/>
    <rect x="105" y="239" width="9" height="7" rx="1"/>
    <rect x="120" y="239" width="9" height="7" rx="1"/>
    <rect x="135" y="239" width="9" height="7" rx="1"/>
    <rect x="150" y="239" width="9" height="7" rx="1"/>
