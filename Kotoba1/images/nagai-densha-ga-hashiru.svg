<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <style>
      /* 電車が左から右へ走る */
      .train {
        animation: train-run 5s linear infinite;
      }
      @keyframes train-run {
        from { transform: translateX(-400px); }
        to   { transform: translateX(305px);  }
      }

      /* 車輪が回転 */
      .wheel {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: wheel-spin 0.4s linear infinite;
      }
      @keyframes wheel-spin {
        to { transform: rotate(360deg); }
      }

      /* 遠くの木がゆっくり流れる（視差効果） */
      .bg-trees {
        animation: bg-scroll 12s linear infinite;
      }
      @keyframes bg-scroll {
        from { transform: translateX(0);     }
        to   { transform: translateX(-300px);}
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 空 -->
  <rect width="300" height="300" fill="url(#sky-grad)" rx="20"/>

  <!-- 山 -->
  <polygon points="-10,230 60,155 135,230"  fill="#a5d6a7"/>
  <polygon points="70,230  165,120 260,230" fill="#81c784"/>
  <polygon points="175,230 250,155 320,230" fill="#a5d6a7"/>
  <!-- 雪の峰 -->
  <polygon points="148,140 165,120 182,140 174,148 156,148" fill="#ffffff" opacity="0.8"/>

  <!-- 遠くの木（視差スクロール） -->
  <g class="bg-trees">
    <!-- セット1 -->
    <rect x="20"  y="213" width="6"  height="20" fill="#4e342e"/>
    <ellipse cx="23"  cy="207" rx="12" ry="12" fill="#388e3c"/>
    <rect x="55"  y="218" width="5"  height="15" fill="#4e342e"/>
    <ellipse cx="57"  cy="213" rx="9"  ry="10" fill="#2e7d32"/>
    <rect x="88"  y="213" width="6"  height="20" fill="#4e342e"/>
    <ellipse cx="91"  cy="206" rx="11" ry="12" fill="#388e3c"/>
    <rect x="130" y="218" width="5"  height="15" fill="#4e342e"/>
    <ellipse cx="132" cy="212" rx="9"  ry="10" fill="#2e7d32"/>
    <rect x="165" y="213" width="6"  height="20" fill="#4e342e"/>
    <ellipse cx="168" cy="206" rx="11" ry="12" fill="#388e3c"/>
    <rect x="205" y="218" width="5"  height="15" fill="#4e342e"/>
    <ellipse cx="207" cy="212" rx="9"  ry="10" fill="#2e7d32"/>
    <rect x="245" y="213" width="6"  height="20" fill="#4e342e"/>
    <ellipse cx="248" cy="206" rx="11" ry="12" fill="#388e3c"/>
    <rect x="280" y="218" width="5"  height="15" fill="#4e342e"/>
    <ellipse cx="282" cy="212" rx="9"  ry="10" fill="#2e7d32"/>
    <!-- セット2（右にずらしてシームレスに） -->
    <rect x="320" y="213" width="6"  height="20" fill="#4e342e"/>
    <ellipse cx="323" cy="207" rx="12" ry="12" fill="#388e3c"/>
    <rect x="355" y="218" width="5"  height="15" fill="#4e342e"/>
    <ellipse cx="357" cy="213" rx="9"  ry="10" fill="#2e7d32"/>
    <rect x="388" y="213" width="6"  height="20" fill="#4e342e"/>
    <ellipse cx="391" cy="206" rx="11" ry="12" fill="#388e3c"/>
    <rect x="430" y="218" width="5"  height="15" fill="#4e342e"/>
    <ellipse cx="432" cy="212" rx="9"  ry="10" fill="#2e7d32"/>
    <rect x="465" y="213" width="6"  height="20" fill="#4e342e"/>
    <ellipse cx="468" cy="206" rx="11" ry="12" fill="#388e3c"/>
    <rect x="505" y="218" width="5"  height="15" fill="#4e342e"/>
    <ellipse cx="507" cy="212" rx="9"  ry="10" fill="#2e7d32"/>
    <rect x="545" y="213" width="6"  height="20" fill="#4e342e"/>
    <ellipse cx="548" cy="206" rx="11" ry="12" fill="#388e3c"/>
    <rect x="580" y="218" width="5"  height="15" fill="#4e342e"/>
    <ellipse cx="582" cy="212" rx="9"  ry="10" fill="#2e7d32"/>
  </g>

  <!-- 地面 -->
  <rect y="230" width="300" height="70" fill="#5d4037"/>
  <rect y="230" width="300" height="12" fill="#6d4c41"/>

  <!-- 架線（静的） -->
  <line x1="0" y1="192" x2="300" y2="192" stroke="#9e9e9e" stroke-width="1.2"/>

  <!-- 線路：まくら木 -->
