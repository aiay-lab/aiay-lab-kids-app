    <line x1="18" y1="238" x2="18" y2="256" stroke="#78909c" stroke-width="1.5"/>
    <line x1="9"  y1="247" x2="27" y2="247" stroke="#78909c" stroke-width="1.5"/>
    <circle cx="18" cy="247" r="3.5" fill="#90a4ae"/>
    <circle class="wheel" cx="66"  cy="247" r="9" fill="#37474f"/>
    <line x1="66" y1="238" x2="66" y2="256" stroke="#78909c" stroke-width="1.5"/>
    <line x1="57" y1="247" x2="75" y2="247" stroke="#78909c" stroke-width="1.5"/>
    <circle cx="66" cy="247" r="3.5" fill="#90a4ae"/>

    <!-- ▶ 2両目 x=80〜156 -->
    <rect x="80"  y="205" width="76" height="34" fill="#eceff1" rx="3"/>
    <rect x="80"  y="215" width="76" height="7"  fill="#1565c0"/>
    <rect x="88"  y="218" width="14" height="10" fill="#b3e5fc" rx="1"/>
    <rect x="107" y="218" width="14" height="10" fill="#b3e5fc" rx="1"/>
    <rect x="126" y="218" width="14" height="10" fill="#b3e5fc" rx="1"/>
    <circle class="wheel" cx="95"  cy="247" r="9" fill="#37474f"/>
    <line x1="95"  y1="238" x2="95"  y2="256" stroke="#78909c" stroke-width="1.5"/>
    <line x1="86"  y1="247" x2="104" y2="247" stroke="#78909c" stroke-width="1.5"/>
    <circle cx="95"  cy="247" r="3.5" fill="#90a4ae"/>
    <circle class="wheel" cx="143" cy="247" r="9" fill="#37474f"/>
    <line x1="143" y1="238" x2="143" y2="256" stroke="#78909c" stroke-width="1.5"/>
    <line x1="134" y1="247" x2="152" y2="247" stroke="#78909c" stroke-width="1.5"/>
    <circle cx="143" cy="247" r="3.5" fill="#90a4ae"/>

    <!-- ▶ 3両目 x=160〜236 -->
    <rect x="160" y="205" width="76" height="34" fill="#eceff1" rx="3"/>
    <rect x="160" y="215" width="76" height="7"  fill="#1565c0"/>
    <rect x="168" y="218" width="14" height="10" fill="#b3e5fc" rx="1"/>
    <rect x="187" y="218" width="14" height="10" fill="#b3e5fc" rx="1"/>
    <rect x="206" y="218" width="14" height="10" fill="#b3e5fc" rx="1"/>
    <circle class="wheel" cx="175" cy="247" r="9" fill="#37474f"/>
    <line x1="175" y1="238" x2="175" y2="256" stroke="#78909c" stroke-width="1.5"/>
    <line x1="166" y1="247" x2="184" y2="247" stroke="#78909c" stroke-width="1.5"/>
    <circle cx="175" cy="247" r="3.5" fill="#90a4ae"/>
    <circle class="wheel" cx="223" cy="247" r="9" fill="#37474f"/>
    <line x1="223" y1="238" x2="223" y2="256" stroke="#78909c" stroke-width="1.5"/>
    <line x1="214" y1="247" x2="232" y2="247" stroke="#78909c" stroke-width="1.5"/>
    <circle cx="223" cy="247" r="3.5" fill="#90a4ae"/>

    <!-- ▶ 4両目 x=240〜316 -->
    <rect x="240" y="205" width="76" height="34" fill="#eceff1" rx="3"/>
    <rect x="240" y="215" width="76" height="7"  fill="#1565c0"/>
    <rect x="248" y="218" width="14" height="10" fill="#b3e5fc" rx="1"/>
    <rect x="267" y="218" width="14" height="10" fill="#b3e5fc" rx="1"/>
    <rect x="286" y="218" width="14" height="10" fill="#b3e5fc" rx="1"/>
    <circle class="wheel" cx="255" cy="247" r="9" fill="#37474f"/>
    <line x1="255" y1="238" x2="255" y2="256" stroke="#78909c" stroke-width="1.5"/>
    <line x1="246" y1="247" x2="264" y2="247" stroke="#78909c" stroke-width="1.5"/>
    <circle cx="255" cy="247" r="3.5" fill="#90a4ae"/>
    <circle class="wheel" cx="303" cy="247" r="9" fill="#37474f"/>
    <line x1="303" y1="238" x2="303" y2="256" stroke="#78909c" stroke-width="1.5"/>
    <line x1="294" y1="247" x2="312" y2="247" stroke="#78909c" stroke-width="1.5"/>
    <circle cx="303" cy="247" r="3.5" fill="#90a4ae"/>

    <!-- ▶ 5両目（最後尾） x=320〜396 -->
    <rect x="320" y="205" width="64" height="34" fill="#eceff1" rx="3"/>
    <rect x="320" y="215" width="64" height="7"  fill="#1565c0"/>
    <!-- 後ろ鼻 -->
    <rect x="378" y="205" width="18" height="34" fill="#1565c0" rx="5"/>
    <!-- 後面ガラス -->
    <rect x="381" y="209" width="12" height="16" fill="#b3e5fc" rx="2"/>
    <!-- テールライト -->
    <circle cx="388" cy="232" r="3" fill="#ef9a9a"/>
    <!-- 窓 -->
    <rect x="328" y="218" width="14" height="10" fill="#b3e5fc" rx="1"/>
    <rect x="347" y="218" width="14" height="10" fill="#b3e5fc" rx="1"/>
    <circle class="wheel" cx="333" cy="247" r="9" fill="#37474f"/>
    <line x1="333" y1="238" x2="333" y2="256" stroke="#78909c" stroke-width="1.5"/>
    <line x1="324" y1="247" x2="342" y2="247" stroke="#78909c" stroke-width="1.5"/>
    <circle cx="333" cy="247" r="3.5" fill="#90a4ae"/>
    <circle class="wheel" cx="381" cy="247" r="9" fill="#37474f"/>
    <line x1="381" y1="238" x2="381" y2="256" stroke="#78909c" stroke-width="1.5"/>
    <line x1="372" y1="247" x2="390" y2="247" stroke="#78909c" stroke-width="1.5"/>
    <circle cx="381" cy="247" r="3.5" fill="#90a4ae"/>

    <!-- 連結器 -->
