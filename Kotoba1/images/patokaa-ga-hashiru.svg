<?xml version="1.0" encoding="UTF-8"?>
<!--
  パトカーが走り出す（日本のパトカー：白上・黒下2トーン）
  演出: 停車→サイレン点灯→エンジン振動→急発進。8秒ループ。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /*
        車の動き: 8秒ループ
        0-19%   : 停車
        19-22%  : エンジン振動
        22-77%  : 加速→退場
        77-100% : 画面外（フェード含む）
      */
      .car {
        animation: car-launch 8s linear infinite;
      }
      @keyframes car-launch {
        0%     { opacity: 0;   transform: translateX(0px);   }
        2%     { opacity: 1;   transform: translateX(0px);   }  /* フェードイン */
        19%    {               transform: translateX(0px);   }  /* 停車 */
        19.4%  {               transform: translateX(-5px);  }  /* 振動 */
        19.8%  {               transform: translateX(5px);   }
        20.2%  {               transform: translateX(-3px);  }
        20.6%  {               transform: translateX(2px);   }
        21%    {               transform: translateX(0px);   }  /* 発進 */
        34%    {               transform: translateX(18px);  }  /* 徐々に加速 */
        52%    {               transform: translateX(95px);  }
        68%    {               transform: translateX(240px); }  /* 高速 */
        76%    { opacity: 1;   transform: translateX(360px); }  /* 退場 */
        78%    { opacity: 0;   transform: translateX(360px); }  /* フェードアウト */
        100%   { opacity: 0;   transform: translateX(0px);   }  /* ループ待機 */
      }

      /* 車輪（発進まで静止） */
      .wheel {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: wheel-spin 8s linear infinite;
      }
      @keyframes wheel-spin {
        0%,21%   { transform: rotate(0deg);    }
        76%      { transform: rotate(1440deg); }
        76%,100% { transform: rotate(1440deg); }
      }

      /* サイレン青（19%=1.52s から点灯） */
      .sir-b {
        animation: flash-b 0.42s linear 1.52s infinite;
      }
      @keyframes flash-b {
        0%,47%   { opacity: 1; }
        50%,100% { opacity: 0.12; }
      }

      /* サイレン赤（0.21s遅れで交互） */
      .sir-r {
        animation: flash-r 0.42s linear 1.73s infinite;
      }
      @keyframes flash-r {
        0%,47%   { opacity: 1; }
        50%,100% { opacity: 0.12; }
      }

      /* スピードライン：走行中のみ流れる */
      .speed-lines {
        animation:
          spd-vis    8s linear infinite,
          spd-scroll 0.36s linear infinite;
      }
      @keyframes spd-vis {
        0%,22%  { opacity: 0; }
        25%     { opacity: 0.5; }
        75%     { opacity: 0.5; }
        78%     { opacity: 0; }
        100%    { opacity: 0; }
      }
      @keyframes spd-scroll {
        from { transform: translateX(0);    }
        to   { transform: translateX(-44px); }
      }

      /* 排気（発進直後） */
      .exhaust {
        transform-box: fill-box;
        transform-origin: 100% 50%;
        opacity: 0;
        animation: exh 8s linear infinite;
      }
      @keyframes exh {
        0%,19%  { opacity: 0;    transform: scale(0.1); }
        20.5%   { opacity: 0.45; transform: scale(1);   }
        24%     { opacity: 0;    transform: scale(2.2) translateX(-14px); }
        100%    { opacity: 0; }
      }
    </style>

    <radialGradient id="hl" cx="0%" cy="50%" r="100%">
      <stop offset="0%"   stop-color="#fff9c4" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 背景: 青空 -->
  <rect width="300" height="300" fill="#87ceeb" rx="20"/>
  <rect width="300" height="120" fill="#5ba4d4" opacity="0.28" rx="20"/>

  <!-- 雲 -->
  <ellipse cx="58"  cy="48" rx="40" ry="18" fill="#fff" opacity="0.9"/>
  <ellipse cx="38"  cy="55" rx="23" ry="15" fill="#fff" opacity="0.9"/>
  <ellipse cx="76"  cy="56" rx="20" ry="13" fill="#fff" opacity="0.9"/>
  <ellipse cx="234" cy="38" rx="46" ry="20" fill="#fff" opacity="0.85"/>
  <ellipse cx="212" cy="47" rx="27" ry="16" fill="#fff" opacity="0.85"/>
  <ellipse cx="257" cy="48" rx="25" ry="14" fill="#fff" opacity="0.85"/>

  <!-- 遠景の木 -->
  <rect x="18"  y="196" width="8"  height="24" fill="#5d4037"/>
  <ellipse cx="22"  cy="188" rx="15" ry="15" fill="#388e3c"/>
  <rect x="46"  y="202" width="7"  height="18" fill="#5d4037"/>
  <ellipse cx="50"  cy="196" rx="12" ry="12" fill="#2e7d32"/>
  <rect x="254" y="198" width="8"  height="22" fill="#5d4037"/>
  <ellipse cx="258" cy="190" rx="15" ry="15" fill="#388e3c"/>
  <rect x="278" y="204" width="7"  height="16" fill="#5d4037"/>
  <ellipse cx="282" cy="198" rx="12" ry="12" fill="#2e7d32"/>

  <!-- 歩道 -->
  <rect y="266" width="300" height="34" fill="#78909c"/>
  <rect y="266" width="300" height="7"  fill="#9e9e9e"/>

  <!-- 道路 -->
  <rect y="252" width="300" height="16" fill="#546e7a"/>

  <!-- センターライン -->
  <rect x="0"   y="257" width="40" height="4" rx="2" fill="#ffee58"/>
  <rect x="56"  y="257" width="40" height="4" rx="2" fill="#ffee58"/>
  <rect x="112" y="257" width="40" height="4" rx="2" fill="#ffee58"/>
  <rect x="168" y="257" width="40" height="4" rx="2" fill="#ffee58"/>
  <rect x="224" y="257" width="40" height="4" rx="2" fill="#ffee58"/>

  <!-- スピードライン -->
  <g class="speed-lines">
    <line x1="0"   y1="219" x2="60"  y2="219" stroke="#b3e5fc" stroke-width="3" stroke-linecap="round"/>
    <line x1="44"  y1="219" x2="104" y2="219" stroke="#b3e5fc" stroke-width="3" stroke-linecap="round"/>
    <line x1="88"  y1="219" x2="148" y2="219" stroke="#b3e5fc" stroke-width="3" stroke-linecap="round"/>
    <line x1="132" y1="219" x2="192" y2="219" stroke="#b3e5fc" stroke-width="3" stroke-linecap="round"/>
    <line x1="176" y1="219" x2="236" y2="219" stroke="#b3e5fc" stroke-width="3" stroke-linecap="round"/>
    <line x1="220" y1="219" x2="280" y2="219" stroke="#b3e5fc" stroke-width="3" stroke-linecap="round"/>
    <line x1="264" y1="219" x2="310" y2="219" stroke="#b3e5fc" stroke-width="3" stroke-linecap="round"/>
    <line x1="8"   y1="231" x2="52"  y2="231" stroke="#b3e5fc" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
    <line x1="52"  y1="231" x2="96"  y2="231" stroke="#b3e5fc" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
    <line x1="96"  y1="231" x2="140" y2="231" stroke="#b3e5fc" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
    <line x1="140" y1="231" x2="184" y2="231" stroke="#b3e5fc" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
    <line x1="184" y1="231" x2="228" y2="231" stroke="#b3e5fc" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
    <line x1="228" y1="231" x2="272" y2="231" stroke="#b3e5fc" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- ヘッドライト光（発進後） -->
  <ellipse class="exhaust" cx="224" cy="232" rx="66" ry="16" fill="url(#hl)"/>

  <!-- 排気 -->
  <ellipse class="exhaust" cx="84"  cy="234" rx="10" ry="7"  fill="#cfd8dc" opacity="0.55"/>

  <!-- ========== パトカーグループ ========== -->
  <g class="car">

    <!-- シャドウ -->
    <ellipse cx="150" cy="264" rx="72" ry="5" fill="#000" opacity="0.10"/>

    <!-- ===== サイレンバー ===== -->
    <rect x="122" y="171" width="56" height="16" rx="3" fill="#1a237e"/>
    <!-- グロー -->
    <circle class="sir-b" cx="136" cy="179" r="11" fill="#1e88e5" opacity="0.20"/>
    <circle class="sir-r" cx="164" cy="179" r="11" fill="#e53935" opacity="0.20"/>
    <!-- ライト本体 -->
    <circle class="sir-b" cx="136" cy="179" r="7"  fill="#1e88e5"/>
    <circle class="sir-r" cx="164" cy="179" r="7"  fill="#e53935"/>

    <!-- ===== セダン屋根（台形） ===== -->
    <!--
      キャビン外形 (台形):
        後ろ下: (98,212)  後ろ上: (108,188)
        前ろ上: (192,188) 前ろ下: (204,212)
    -->
    <polygon points="98,212 108,188 192,188 204,212" fill="#f0f0f0" stroke="#cccccc" stroke-width="1.2"/>

    <!-- Aピラー・Cピラー（暗い色で枠） -->
    <!-- 後ろピラー -->
    <polygon points="98,212 108,189 116,189 110,212" fill="#bdbdbd"/>
    <!-- 前ピラー -->
    <polygon points="188,189 203,212 195,212 190,189" fill="#bdbdbd"/>

    <!-- 窓ガラス3分割 -->
    <!-- 後部窓（リアクォーター） -->
    <polygon points="111,189 120,189 118,212 108,212" fill="#b3e5fc" opacity="0.88"/>
    <!-- 後席ドア窓 -->
    <rect x="121" y="189" width="34" height="23" fill="#b3e5fc" opacity="0.88"/>
    <!-- Bピラー -->
    <rect x="155" y="188" width="4"  height="24" fill="#bdbdbd"/>
    <!-- 前席ドア窓 -->
    <rect x="160" y="189" width="27" height="23" fill="#b3e5fc" opacity="0.88"/>

    <!-- ===== 車体（白上・黒下） ===== -->
    <!-- 白上部（ドアの上半分） -->
    <rect x="82" y="212" width="138" height="17" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <!-- 境界線（細い銀ライン） -->
    <rect x="82" y="228" width="138" height="2"  fill="#9e9e9e"/>
    <!-- 黒下部（ドアの下半分〜サイドシル） -->
    <rect x="82" y="230" width="138" height="20" fill="#212121" rx="0"/>
    <!-- 下端の丸み処理 -->
    <rect x="84" y="230" width="134" height="20" fill="#212121" rx="3"/>

    <!-- ドア区切り線 -->
    <line x1="153" y1="212" x2="153" y2="250" stroke="#9e9e9e" stroke-width="1.2"/>

    <!-- ===== フロント ===== -->
    <!-- ボンネット（フード） -->
    <polygon points="204,212 220,218 220,230 204,230" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
    <!-- フロントグリル -->
    <rect x="214" y="230" width="10" height="16" rx="2" fill="#212121"/>
    <!-- グリルメッシュ（横線2本） -->
    <line x1="214" y1="235" x2="224" y2="235" stroke="#37474f" stroke-width="1.2"/>
    <line x1="214" y1="240" x2="224" y2="240" stroke="#37474f" stroke-width="1.2"/>
    <!-- ヘッドライト（横長・現代的） -->
    <rect x="210" y="216" width="12" height="8"  rx="2" fill="#fff9c4" stroke="#f9a825" stroke-width="0.8"/>
    <rect x="212" y="217" width="8"  height="6"  rx="1" fill="#ffee58"/>
    <!-- フロントバンパー -->
    <rect x="212" y="244" width="12" height="7"  rx="2" fill="#9e9e9e"/>
    <!-- ナンバープレート -->
    <rect x="212" y="244" width="12" height="5"  rx="1" fill="#e8f5e9" stroke="#9e9e9e" stroke-width="0.6"/>

    <!-- ===== リア ===== -->
    <!-- トランクリッド -->
    <polygon points="82,212 82,230 66,224 68,218" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
    <!-- テールライト（縦型） -->
    <rect x="66" y="214" width="10" height="10" rx="2" fill="#ef5350"/>
    <rect x="66" y="226" width="10" height="6"  rx="1" fill="#ef9a9a" opacity="0.8"/>
    <!-- リアバンパー -->
    <rect x="66" y="244" width="14" height="7"  rx="2" fill="#9e9e9e"/>

    <!-- ===== 前輪 ===== -->
    <g class="wheel">
      <!-- ホイールアーチ（白塗り） -->
      <ellipse cx="188" cy="250" rx="18" ry="9" fill="#f5f5f5"/>
      <circle cx="188" cy="252" r="14" fill="#263238"/>
      <circle cx="188" cy="252" r="9"  fill="#37474f"/>
      <circle cx="188" cy="252" r="5"  fill="#546e7a"/>
      <line x1="188" y1="238" x2="188" y2="266" stroke="#607d8b" stroke-width="2"/>
      <line x1="174" y1="252" x2="202" y2="252" stroke="#607d8b" stroke-width="2"/>
      <circle cx="188" cy="252" r="2.5" fill="#90a4ae"/>
    </g>

    <!-- ===== 後輪 ===== -->
    <g class="wheel">
      <!-- ホイールアーチ（白塗り） -->
      <ellipse cx="108" cy="250" rx="18" ry="9" fill="#f5f5f5"/>
      <circle cx="108" cy="252" r="14" fill="#263238"/>
      <circle cx="108" cy="252" r="9"  fill="#37474f"/>
      <circle cx="108" cy="252" r="5"  fill="#546e7a"/>
      <line x1="108" y1="238" x2="108" y2="266" stroke="#607d8b" stroke-width="2"/>
      <line x1="94"  y1="252" x2="122" y2="252" stroke="#607d8b" stroke-width="2"/>
      <circle cx="108" cy="252" r="2.5" fill="#90a4ae"/>
    </g>

    <!-- アンダーボディ（ロアボディ〜地面をつなぐ） -->
    <rect x="84" y="248" width="134" height="4" fill="#1a1a1a" rx="2"/>

  </g><!-- end car -->

</g>
</svg>
