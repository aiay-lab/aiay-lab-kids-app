<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    
    <style>
      .bg-music { fill: #f3e5f5; }
      
      /* タンバリンを叩く動き */
      .tambourine-hit {
        transform-origin: 150px 150px;
        animation: hit-action 1s infinite linear;
      }
      @keyframes hit-action {
        0%, 100% { transform: scale(1) rotate(0deg); }
        10%, 30%, 50% { transform: scale(1.1) rotate(-5deg); } /* 叩いた瞬間 */
        20%, 40% { transform: scale(1) rotate(0deg); }
      }

      /* 弾ける音符エフェクト */
      .note-effect {
        animation: note-pop 1s infinite;
        opacity: 0;
      }
      @keyframes note-pop {
        0% { transform: translate(0,0) scale(0); opacity: 0; }
        10%, 50% { transform: translate(var(--mx), var(--my)) scale(1); opacity: 1; }
        80%, 100% { transform: translate(var(--mx), var(--my)) scale(0.5); opacity: 0; }
      }

      /* キラキラ */
      .sparkle {
        animation: hit-sparkle 1s infinite;
      }
      @keyframes hit-sparkle {
        0%, 20% { opacity: 0; transform: scale(0); }
        30% { opacity: 1; transform: scale(1.2); }
        50%, 100% { opacity: 0; transform: scale(0.5); }
      }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="300" height="300" class="bg-music" />
    
    <!-- 背景の音符（固定） -->
    <text x="20" y="50" font-size="30" fill="#ce93d8" opacity="0.4">♪</text>
    <text x="250" y="80" font-size="40" fill="#ce93d8" opacity="0.4">♫</text>
    <text x="50" y="250" font-size="35" fill="#ce93d8" opacity="0.4">♬</text>

    <!-- タンバリン本体 -->
    <g class="tambourine-hit">
      <!-- 枠 -->
      <circle cx="150" cy="150" r="80" fill="none" stroke="#ffb74d" stroke-width="24" />
      <circle cx="150" cy="150" r="80" fill="none" stroke="#ffa726" stroke-width="2" />
      
      <!-- 皮（中央部分） -->
      <circle cx="150" cy="150" r="68" fill="#fff9c4" opacity="0.9" />
      
      <!-- ジングル（鈴） -->
      <g fill="#ffd54f" stroke="#fbc02d" stroke-width="1">
        <circle cx="150" cy="70" r="12" />
        <circle cx="150" cy="230" r="12" />
        <circle cx="70" cy="150" r="12" />
        <circle cx="230" cy="150" r="12" />
        <circle cx="94" cy="94" r="12" />
        <circle cx="206" cy="94" r="12" />
        <circle cx="94" cy="206" r="12" />
        <circle cx="206" cy="206" r="12" />
      </g>

      <!-- 持ち手（穴） -->
      <rect x="135" y="60" width="30" height="15" rx="7" fill="#f3e5f5" />
    </g>

    <!-- 叩いた時のエフェクト -->
    <!-- 音符1 -->
    <g class="note-effect" style="--mx: 60px; --my: -60px; animation-delay: 0.1s;">
      <text x="150" y="150" font-size="24" fill="#ab47bc">♪</text>
    </g>
    <!-- 音符2 -->
    <g class="note-effect" style="--mx: -70px; --my: -50px; animation-delay: 0.3s;">
      <text x="150" y="150" font-size="28" fill="#ec407a">♫</text>
    </g>
    <!-- 音符3 -->
    <g class="note-effect" style="--mx: 50px; --my: 70px; animation-delay: 0.5s;">
      <text x="150" y="150" font-size="22" fill="#7e57c2">♬</text>
    </g>

    <!-- 中央のキラキラ -->
    <g class="sparkle" transform="translate(150, 150)">
      <path d="M 0,-20 L 5,-5 L 20,0 L 5,5 L 0,20 L -5,5 L -20,0 L -5,-5 Z" fill="#ffd54f" />
    </g>
  </g>
</svg>