<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* 茎が伸びる */
      .stem {
        stroke-dasharray: 145;
        stroke-dashoffset: 145;
        animation: grow-stem 0.6s ease-out 0.1s forwards;
      }
      @keyframes grow-stem {
        to { stroke-dashoffset: 0; }
      }

      /* 葉っぱがフェードイン */
      .leaf {
        opacity: 0;
        animation: leaf-in 0.4s ease-out forwards;
      }
      @keyframes leaf-in {
        to { opacity: 1; }
      }

      /* 花びらが根本から開く */
      .petal {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        transform: scaleY(0);
        opacity: 0;
        animation: petal-open 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes petal-open {
        0%   { transform: scaleY(0); opacity: 0.8; }
        100% { transform: scaleY(1); opacity: 1; }
      }

      /* 中心がポンと出る */
      .center {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        transform: scale(0);
        animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes pop {
        to { transform: scale(1); }
      }

      /* キラキラ */
      .sparkle {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        transform: scale(0);
        opacity: 0;
        animation: sparkle-anim 0.9s ease-out forwards;
      }
      @keyframes sparkle-anim {
        0%   { transform: scale(0); opacity: 0; }
        35%  { transform: scale(1.4); opacity: 1; }
        100% { transform: scale(0.2); opacity: 0; }
      }

      /* 咲いたあとにやさしく揺れる */
      .flower-all {
        transform-origin: 150px 270px;
        animation: gentle-sway 4s ease-in-out 2.2s infinite;
      }
      @keyframes gentle-sway {
        0%,100% { transform: rotate(0deg); }
        30%     { transform: rotate(2.5deg); }
        70%     { transform: rotate(-2.5deg); }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 空の背景 -->
  <rect width="300" height="300" fill="#e3f2fd" rx="20"/>
  <rect y="160" width="300" height="140" fill="#c8e6c9" rx="0"/>
  <rect y="160" width="300" height="140" fill="#c8e6c9"/>
  <rect y="220" width="300" height="80" fill="#a5d6a7"/>

  <!-- 丘 -->
  <ellipse cx="150" cy="272" rx="140" ry="35" fill="#81c784"/>

  <!-- お日さま -->
  <circle cx="245" cy="50" r="28" fill="#fff176"/>
  <line x1="245" y1="10" x2="245" y2="4"  stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="245" y1="90" x2="245" y2="96" stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="205" y1="50" x2="199" y2="50" stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="285" y1="50" x2="291" y2="50" stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="217" y1="22" x2="212" y2="17" stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="273" y1="78" x2="278" y2="83" stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="217" y1="78" x2="212" y2="83" stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="273" y1="22" x2="278" y2="17" stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>

  <g class="flower-all">
    <!-- 茎（下から上へ伸びる） -->
    <line x1="150" y1="268" x2="150" y2="130"
          stroke="#43a047" stroke-width="8" stroke-linecap="round"
          class="stem"/>

    <!-- 左の葉っぱ -->
    <ellipse cx="118" cy="192" rx="33" ry="11" fill="#66bb6a"
             transform="rotate(-32, 150, 195)"
             class="leaf" style="animation-delay: 0.65s"/>

    <!-- 右の葉っぱ -->
    <ellipse cx="182" cy="215" rx="33" ry="11" fill="#4caf50"
             transform="rotate(32, 150, 218)"
             class="leaf" style="animation-delay: 0.85s"/>

    <!-- 花びら 8枚（中心 150,120 から放射） -->
    <!-- 各ペタル: cx=150, cy=84, rx=13, ry=29 (底が y=113 ≈ 花の中心 y=120) -->
    <g transform="rotate(0, 150, 120)">
      <ellipse class="petal" cx="150" cy="84" rx="13" ry="30"
               fill="#f48fb1" style="animation-delay: 0.95s"/>
    </g>
    <g transform="rotate(45, 150, 120)">
      <ellipse class="petal" cx="150" cy="84" rx="13" ry="30"
               fill="#ec407a" style="animation-delay: 1.0s"/>
    </g>
    <g transform="rotate(90, 150, 120)">
      <ellipse class="petal" cx="150" cy="84" rx="13" ry="30"
               fill="#f48fb1" style="animation-delay: 1.05s"/>
    </g>
    <g transform="rotate(135, 150, 120)">
      <ellipse class="petal" cx="150" cy="84" rx="13" ry="30"
               fill="#ec407a" style="animation-delay: 1.1s"/>
    </g>
    <g transform="rotate(180, 150, 120)">
      <ellipse class="petal" cx="150" cy="84" rx="13" ry="30"
               fill="#f48fb1" style="animation-delay: 1.15s"/>
    </g>
    <g transform="rotate(225, 150, 120)">
      <ellipse class="petal" cx="150" cy="84" rx="13" ry="30"
               fill="#ec407a" style="animation-delay: 1.2s"/>
    </g>
    <g transform="rotate(270, 150, 120)">
      <ellipse class="petal" cx="150" cy="84" rx="13" ry="30"
               fill="#f48fb1" style="animation-delay: 1.25s"/>
    </g>
    <g transform="rotate(315, 150, 120)">
      <ellipse class="petal" cx="150" cy="84" rx="13" ry="30"
               fill="#ec407a" style="animation-delay: 1.3s"/>
    </g>

    <!-- 花の中心（黄色） -->
    <circle class="center" cx="150" cy="120" r="22" fill="#fdd835" style="animation-delay: 1.45s"/>
    <circle class="center" cx="150" cy="120" r="13" fill="#f9a825" style="animation-delay: 1.6s"/>
  </g>

  <!-- キラキラ（花の周りに）-->
  <circle class="sparkle" cx="124" cy="82"  r="6" fill="#fff59d" style="animation-delay: 1.8s"/>
  <circle class="sparkle" cx="176" cy="78"  r="5" fill="#fff59d" style="animation-delay: 2.0s"/>
  <circle class="sparkle" cx="106" cy="110" r="5" fill="#fff59d" style="animation-delay: 1.9s"/>
  <circle class="sparkle" cx="194" cy="108" r="6" fill="#fff59d" style="animation-delay: 2.05s"/>
  <circle class="sparkle" cx="150" cy="62"  r="5" fill="#fff59d" style="animation-delay: 2.1s"/>
</g>
</svg>
