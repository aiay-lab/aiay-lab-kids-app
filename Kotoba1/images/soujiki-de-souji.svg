<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* 掃除機が左右に行き来する（7秒ループ） */
      .vacuum-pos {
        animation: vac-move 7s ease-in-out infinite;
      }
      @keyframes vac-move {
        0%, 8%   { transform: translateX(-55px); }
        42%, 58% { transform: translateX(55px); }
        92%,100% { transform: translateX(-55px); }
      }
      /* 掃除機のランプ点滅 */
      .lamp {
        animation: lamp-blink 0.9s ease-in-out infinite alternate;
      }
      @keyframes lamp-blink {
        from { fill: #ffd54f; opacity: 1; }
        to   { fill: #fff9c4; opacity: 0.5; }
      }
      /* ホコリが舞い上がって消える */
      .dust {
        animation: dust-up 7s ease-in infinite;
      }
      .d2 { animation-delay: 2.3s; }
      .d3 { animation-delay: 4.6s; }
      @keyframes dust-up {
        0%,35%  { transform: translate(0, 0);       opacity: 0.65; }
        55%     { transform: translate(-12px,-28px); opacity: 0.3; }
        70%,100%{ transform: translate(-18px,-44px); opacity: 0; }
      }
      /* ブラシが回る（ノズル底） */
      .brush {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: brush-spin 0.4s linear infinite;
      }
      @keyframes brush-spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 壁 -->
  <rect width="300" height="300" fill="#fff9e6"/>

  <!-- 床（木目） -->
  <rect y="255" width="300" height="45" fill="#8d6e63"/>
  <line x1="0"   y1="264" x2="300" y2="264" stroke="#7d5c53" stroke-width="1"/>
  <line x1="0"   y1="274" x2="300" y2="274" stroke="#7d5c53" stroke-width="1"/>
  <line x1="0"   y1="284" x2="300" y2="284" stroke="#7d5c53" stroke-width="1"/>
  <line x1="55"  y1="255" x2="60"  y2="300" stroke="#7d5c53" stroke-width="0.5"/>
  <line x1="145" y1="255" x2="152" y2="300" stroke="#7d5c53" stroke-width="0.5"/>
  <line x1="235" y1="255" x2="243" y2="300" stroke="#7d5c53" stroke-width="0.5"/>
  <!-- 幅木 -->
  <rect y="253" width="300" height="4" fill="#6d4c41"/>

  <!-- 床のホコリ（静的点） -->
  <circle cx="80"  cy="251" r="2.5" fill="#a09070" opacity="0.55"/>
  <circle cx="130" cy="250" r="2"   fill="#a09070" opacity="0.45"/>
  <circle cx="190" cy="251" r="2"   fill="#a09070" opacity="0.50"/>
  <circle cx="240" cy="250" r="2.5" fill="#a09070" opacity="0.45"/>

  <!-- ========== 掃除機グループ ========== -->
  <g class="vacuum-pos">

    <!-- ノズル（床面） -->
    <rect x="100" y="240" width="100" height="14" rx="7" fill="#1565c0"/>
    <!-- ノズル底ブラシ -->
    <rect x="106" y="249" width="88" height="5"  rx="2.5" fill="#0d47a1"/>
    <!-- ブラシローラー（回転） -->
    <ellipse class="brush" cx="150" cy="251" rx="6" ry="3" fill="none"
             stroke="#42a5f5" stroke-width="1.5" stroke-dasharray="4 4"/>
    <!-- 車輪（左） -->
    <circle cx="112" cy="254" r="5" fill="#0d47a1"/>
    <circle cx="112" cy="254" r="2" fill="#1976d2"/>
    <!-- 車輪（右） -->
    <circle cx="188" cy="254" r="5" fill="#0d47a1"/>
    <circle cx="188" cy="254" r="2" fill="#1976d2"/>

    <!-- 接続チューブ（ノズル〜ボディ） -->
    <rect x="142" y="198" width="16" height="46" rx="7" fill="#1565c0"/>

    <!-- ボディ本体 -->
    <rect x="126" y="135" width="48" height="70" rx="18" fill="#e53935"/>
    <!-- ボディ上部の丸み -->
    <ellipse cx="150" cy="135" rx="24" ry="12" fill="#ef5350"/>
    <!-- ダストカップ（透明窓） -->
    <rect x="133" y="148" width="34" height="36" rx="8" fill="#bbdefb" opacity="0.88"/>
    <!-- カップ内ゴミ -->
    <ellipse cx="150" cy="175" rx="12" ry="6" fill="#8d6e63" opacity="0.50"/>
    <circle cx="143" cy="165" r="3"   fill="#795548" opacity="0.45"/>
    <circle cx="158" cy="160" r="2.5" fill="#795548" opacity="0.40"/>
    <!-- 電源ランプ -->
    <circle class="lamp" cx="150" cy="196" r="6"  fill="#ffd54f"/>
    <!-- 区切りライン -->
    <line x1="132" y1="188" x2="168" y2="188" stroke="#c62828" stroke-width="1.5" stroke-linecap="round"/>

    <!-- ハンドル（パイプ） -->
    <line x1="150" y1="138" x2="136" y2="48" stroke="#b71c1c" stroke-width="9" stroke-linecap="round"/>
    <!-- グリップ -->
    <rect x="126" y="40" width="30" height="17" rx="8.5" fill="#b71c1c"/>
    <rect x="130" y="44" width="22" height="9"  rx="4.5" fill="#c62828"/>
    <!-- グリップボタン（トリガー） -->
    <rect x="135" y="55" width="18" height="8" rx="4" fill="#ff8f00"/>

    <!-- ホコリパーティクル（ノズル前から舞い上がる） -->
    <circle class="dust"    cx="97"  cy="247" r="4.5" fill="#c8b090"/>
    <circle class="dust d2" cx="104" cy="245" r="3.5" fill="#c8b090"/>
    <circle class="dust d3" cx="101" cy="249" r="3"   fill="#c8b090"/>

  </g>

  </g>
</svg>
