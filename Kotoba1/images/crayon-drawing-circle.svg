<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>

    <!-- クレヨン風の質感フィルター（ペン本体だけに適用） -->
    <filter id="crayon-texture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" />
    </filter>

    <style>
      .paper { fill: #fffef0; }

      /* 線（フィルターなし・正確な位置に描画） */
      .drawn-line {
        fill: none;
        stroke: #4caf50;
        stroke-width: 18;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: draw-circle 8s linear infinite;
      }
      @keyframes draw-circle {
        0%   { stroke-dashoffset: 100; opacity: 1; }
        70%  { stroke-dashoffset: 0;   opacity: 1; }
        90%  { stroke-dashoffset: 0;   opacity: 0; }
        100% { stroke-dashoffset: 100; opacity: 0; }
      }

      /* クレヨン移動（CSSモーションパス：線と同じタイムライン） */
      .crayon-mover {
        offset-path: path("M 150,60 A 90,90 0 1,1 149.9,60 Z");
        offset-anchor: 0px 0px;
        offset-rotate: auto;
        animation: move-crayon 8s linear infinite, crayon-show 8s linear infinite;
      }
      @keyframes move-crayon {
        0%   { offset-distance: 0%; }
        70%  { offset-distance: 100%; }
        100% { offset-distance: 100%; }
      }
      @keyframes crayon-show {
        0%, 70%  { opacity: 1; }
        71%, 100% { opacity: 0; }
      }

      /* クレヨン揺れ＋テクスチャ（ペン本体のみ） */
      .crayon-body {
        animation: crayon-jitter 0.05s infinite;
        filter: url(#crayon-texture);
      }
      @keyframes crayon-jitter {
        0%   { transform: translate(0, 0); }
        100% { transform: translate(1px, 0.5px); }
      }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="300" height="300" class="paper" />

    <!-- 線（フィルターなし） -->
    <path d="M 150,60 A 90,90 0 1,1 149.9,60 Z"
          class="drawn-line" pathLength="100" />

    <!-- クレヨン（CSSモーションパスで移動） -->
    <g class="crayon-mover">
      <g class="crayon-body">
        <!-- rotate(180)で先端(0,0)を進行方向に向ける -->
        <g transform="rotate(180)">
          <path d="M 0,0 L 15,-8 L 15,8 Z" fill="#4caf50" />
          <rect x="15" y="-12" width="55" height="24" fill="#4caf50" rx="3" />
          <rect x="20" y="-13" width="40" height="26" fill="#c8e6c9" rx="1" />
          <text x="40" y="5" font-family="sans-serif" font-size="10" fill="#2e7d32"
                text-anchor="middle" font-weight="bold"
                transform="scale(-1,1) translate(-80,0)">緑</text>
        </g>
      </g>
    </g>
  </g>
</svg>
