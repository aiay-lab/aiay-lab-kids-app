<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>

    <!-- 鉛筆の質感フィルター（ペン本体だけに適用） -->
    <filter id="pencil-texture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" />
    </filter>

    <style>
      .paper { fill: #fdfdfd; }

      /* 線（フィルターなし・正確な位置に描画） */
      .written-line {
        fill: none;
        stroke: #444;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: draw-square 8s linear infinite;
      }
      @keyframes draw-square {
        0%   { stroke-dashoffset: 100; opacity: 1; }
        70%  { stroke-dashoffset: 0;   opacity: 1; }
        90%  { stroke-dashoffset: 0;   opacity: 0; }
        100% { stroke-dashoffset: 100; opacity: 0; }
      }

      /* 鉛筆移動（CSSモーションパス：線と同じタイムライン） */
      .pencil-mover {
        offset-path: path("M 70,70 L 230,70 L 230,230 L 70,230 L 70,70");
        offset-anchor: 0px 0px;
        offset-rotate: auto;
        animation: move-pencil 8s linear infinite, pencil-show 8s linear infinite;
      }
      @keyframes move-pencil {
        0%   { offset-distance: 0%; }
        70%  { offset-distance: 100%; }
        100% { offset-distance: 100%; }
      }
      @keyframes pencil-show {
        0%, 70%  { opacity: 1; }
        71%, 100% { opacity: 0; }
      }

      /* 鉛筆揺れ＋テクスチャ（ペン本体のみ） */
      .pencil-body {
        animation: pencil-vibe 0.05s infinite alternate;
        filter: url(#pencil-texture);
      }
      @keyframes pencil-vibe {
        from { transform: translate(0, 0); }
        to   { transform: translate(0.5px, 0.5px); }
      }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="300" height="300" class="paper" />

    <!-- 線（フィルターなし） -->
    <path d="M 70,70 L 230,70 L 230,230 L 70,230 L 70,70"
          class="written-line" pathLength="100" />

    <!-- 鉛筆（CSSモーションパスで移動） -->
    <g class="pencil-mover">
      <g class="pencil-body">
        <!-- rotate(-30)で自然な持ち方の角度にする（先端は(0,0)のまま） -->
        <g transform="rotate(-30)">
          <path d="M 0,0 L -5,-2 L -5,2 Z" fill="#444" />
          <path d="M -5,-2 L -15,-4 L -15,4 L -5,2 Z" fill="#e0c090" />
          <rect x="-85" y="-4" width="70" height="8" fill="#ffcc33" />
          <rect x="-90" y="-4" width="5"  height="8" fill="#aaa" />
          <rect x="-100" y="-4" width="10" height="8" fill="#ff9999" rx="1" />
        </g>
      </g>
    </g>
  </g>
</svg>
