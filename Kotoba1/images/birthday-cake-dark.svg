<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* ======= 順番に点火（opacityのみ・15s ループ） ======= */
      /* 点火タイミング: c1=4%, c2=13%, c3=23%, c4=33%, c5=43% */
      .ga1 { animation: ga1 15s ease-in-out infinite; }
      .ga2 { animation: ga2 15s ease-in-out infinite; }
      .ga3 { animation: ga3 15s ease-in-out infinite; }
      .ga4 { animation: ga4 15s ease-in-out infinite; }
      .ga5 { animation: ga5 15s ease-in-out infinite; }

      @keyframes ga1 {
        0%        { opacity: 0; }
        2%        { opacity: 1; }   /* 0.3s で点火 */
        83%       { opacity: 1; }
        90%,100%  { opacity: 0; }
      }
      @keyframes ga2 {
        0%,10%    { opacity: 0; }
        12%       { opacity: 1; }   /* 1.8s で点火 */
        83%       { opacity: 1; }
        90%,100%  { opacity: 0; }
      }
      @keyframes ga3 {
        0%,20%    { opacity: 0; }
        22%       { opacity: 1; }   /* 3.3s で点火 */
        83%       { opacity: 1; }
        90%,100%  { opacity: 0; }
      }
      @keyframes ga4 {
        0%,30%    { opacity: 0; }
        32%       { opacity: 1; }   /* 4.8s で点火 */
        83%       { opacity: 1; }
        90%,100%  { opacity: 0; }
      }
      @keyframes ga5 {
        0%,40%    { opacity: 0; }
        42%       { opacity: 1; }   /* 6.3s で点火 */
        83%       { opacity: 1; }
        90%,100%  { opacity: 0; }
      }

      /* ======= 炎（opacity appear + ゆらゆら transform を同時に） ======= */
      .flame-1 {
        transform-box: fill-box; transform-origin: 50% 100%;
        animation: ga1 15s ease-in-out infinite,
                   fl1 0.70s ease-in-out infinite alternate;
      }
      .flame-2 {
        transform-box: fill-box; transform-origin: 50% 100%;
        animation: ga2 15s ease-in-out infinite,
                   fl2 0.85s ease-in-out infinite alternate;
        animation-delay: 0s, 0.15s;
      }
      .flame-3 {
        transform-box: fill-box; transform-origin: 50% 100%;
        animation: ga3 15s ease-in-out infinite,
                   fl3 0.75s ease-in-out infinite alternate;
        animation-delay: 0s, 0.08s;
      }
      .flame-4 {
        transform-box: fill-box; transform-origin: 50% 100%;
        animation: ga4 15s ease-in-out infinite,
                   fl4 0.90s ease-in-out infinite alternate;
        animation-delay: 0s, 0.22s;
      }
      .flame-5 {
        transform-box: fill-box; transform-origin: 50% 100%;
        animation: ga5 15s ease-in-out infinite,
                   fl5 0.78s ease-in-out infinite alternate;
        animation-delay: 0s, 0.12s;
      }

      @keyframes fl1 { 0% { transform: scaleX(1)    scaleY(1)    rotate(0deg);  } 100% { transform: scaleX(0.88) scaleY(1.12) rotate(-6deg); } }
      @keyframes fl2 { 0% { transform: scaleX(1)    scaleY(1)    rotate(0deg);  } 100% { transform: scaleX(1.10) scaleY(0.94) rotate(5deg);  } }
      @keyframes fl3 { 0% { transform: scaleX(1)    scaleY(1)    rotate(0deg);  } 100% { transform: scaleX(0.92) scaleY(1.08) rotate(4deg);  } }
      @keyframes fl4 { 0% { transform: scaleX(1)    scaleY(1)    rotate(0deg);  } 100% { transform: scaleX(1.08) scaleY(0.93) rotate(-5deg); } }
      @keyframes fl5 { 0% { transform: scaleX(1)    scaleY(1)    rotate(0deg);  } 100% { transform: scaleX(0.90) scaleY(1.10) rotate(-4deg); } }
    </style>
  </defs>

  <g clip-path="url(#frame)">

    <!-- ===== 暗い部屋の背景 ===== -->
    <rect width="300" height="300" fill="#080010"/>
    <!-- 壁の薄いテクスチャ（わずかに明るい上部） -->
    <rect width="300" height="180" fill="#0e0018" opacity="0.5"/>
    <!-- テーブル面 -->
    <rect x="0" y="266" width="300" height="34" fill="#0e0620"/>
    <line x1="0" y1="266" x2="300" y2="266" stroke="#1a0a2e" stroke-width="2"/>
    <!-- 背景の微細な点（ボケ感） -->
    <circle cx="28"  cy="35"  r="1.5" fill="#fff" opacity="0.08"/>
    <circle cx="75"  cy="18"  r="1"   fill="#fff" opacity="0.06"/>
    <circle cx="240" cy="28"  r="1.5" fill="#fff" opacity="0.08"/>
    <circle cx="272" cy="55"  r="1"   fill="#fff" opacity="0.07"/>
    <circle cx="18"  cy="130" r="1"   fill="#fff" opacity="0.05"/>
    <circle cx="285" cy="120" r="1.5" fill="#fff" opacity="0.06"/>
    <circle cx="55"  cy="72"  r="1"   fill="#fff" opacity="0.05"/>
    <circle cx="255" cy="88"  r="1"   fill="#fff" opacity="0.05"/>

    <!-- ===== ろうそく光・背景グロー（大：ケーキ背後を照らす） ===== -->
    <g class="ga1"><ellipse cx="108" cy="200" rx="105" ry="95"  fill="#e65100" opacity="0.18"/></g>
    <g class="ga2"><ellipse cx="127" cy="200" rx="98"  ry="88"  fill="#e65100" opacity="0.18"/></g>
    <g class="ga3"><ellipse cx="150" cy="197" rx="108" ry="98"  fill="#e65100" opacity="0.20"/></g>
    <g class="ga4"><ellipse cx="173" cy="200" rx="98"  ry="88"  fill="#e65100" opacity="0.18"/></g>
    <g class="ga5"><ellipse cx="192" cy="200" rx="105" ry="95"  fill="#e65100" opacity="0.18"/></g>

    <!-- ===== ケーキ ===== -->

    <!-- 影 -->
    <ellipse cx="152" cy="274" rx="116" ry="7" fill="#000" opacity="0.6"/>
    <!-- お皿 -->
    <ellipse cx="150" cy="270" rx="112" ry="9" fill="#d0c4c4" opacity="0.9"/>
    <ellipse cx="150" cy="270" rx="112" ry="9" fill="none" stroke="#b0a0a0" stroke-width="1.5"/>

    <!-- 下段 本体（ワインレッド：ろうそく光で赤く見える） -->
    <rect x="55" y="214" width="190" height="55" rx="5" fill="#880e4f"/>
    <line x1="55" y1="236" x2="245" y2="236" stroke="#6a0136" stroke-width="2" opacity="0.5"/>
    <!-- 側面デコ -->
    <circle cx="75"  cy="248" r="4" fill="#ad1457" opacity="0.8"/>
    <circle cx="102" cy="244" r="3" fill="#f8bbd0" opacity="0.35"/>
    <circle cx="128" cy="248" r="4" fill="#ad1457" opacity="0.8"/>
    <circle cx="155" cy="244" r="3" fill="#f8bbd0" opacity="0.35"/>
    <circle cx="182" cy="248" r="4" fill="#ad1457" opacity="0.8"/>
    <circle cx="208" cy="244" r="3" fill="#f8bbd0" opacity="0.35"/>
    <circle cx="230" cy="248" r="4" fill="#ad1457" opacity="0.8"/>
    <!-- 上面クリーム -->
    <ellipse cx="150" cy="214" rx="95" ry="9" fill="#f0e4e4" opacity="0.88"/>
    <!-- フロスティング -->
    <path d="M 62,218 Q 73,230 84,218 Q 95,230 106,218 Q 117,230 128,218 Q 139,230 150,218 Q 161,230 172,218 Q 183,230 194,218 Q 205,230 216,218 Q 227,230 237,221"
          fill="#f0e4e4" opacity="0.78"/>
    <!-- クリームデコボール -->
    <circle cx="83"  cy="212" r="5" fill="#c2185b" opacity="0.9"/>
    <circle cx="108" cy="210" r="5" fill="#e91e63" opacity="0.9"/>
    <circle cx="133" cy="210" r="5" fill="#c2185b" opacity="0.9"/>
    <circle cx="158" cy="210" r="5" fill="#e91e63" opacity="0.9"/>
    <circle cx="183" cy="210" r="5" fill="#c2185b" opacity="0.9"/>
    <circle cx="208" cy="212" r="5" fill="#e91e63" opacity="0.9"/>
    <circle cx="228" cy="213" r="4" fill="#c2185b" opacity="0.9"/>

    <!-- 上段 本体（ダークチョコレート） -->
    <rect x="84" y="167" width="132" height="50" rx="5" fill="#3e2723"/>
    <line x1="84" y1="188" x2="216" y2="188" stroke="#4e342e" stroke-width="2" opacity="0.6"/>
    <!-- 側面デコ -->
    <circle cx="100" cy="200" r="4" fill="#5d4037" opacity="0.9"/>
    <circle cx="125" cy="196" r="3" fill="#bcaaa4" opacity="0.3"/>
    <circle cx="150" cy="200" r="4" fill="#5d4037" opacity="0.9"/>
    <circle cx="175" cy="196" r="3" fill="#bcaaa4" opacity="0.3"/>
    <circle cx="200" cy="200" r="4" fill="#5d4037" opacity="0.9"/>
    <!-- 上面クリーム -->
    <ellipse cx="150" cy="167" rx="66" ry="8" fill="#e8dcd8" opacity="0.88"/>
    <!-- フロスティング -->
    <path d="M 90,171 Q 99,182 109,171 Q 119,182 129,171 Q 139,182 149,171 Q 159,182 169,171 Q 179,182 189,171 Q 199,182 209,173"
          fill="#e8dcd8" opacity="0.78"/>
    <!-- クリームデコボール -->
    <circle cx="104" cy="165" r="4" fill="#d7a76e" opacity="0.95"/>
    <circle cx="126" cy="163" r="4" fill="#c49a4e" opacity="0.95"/>
    <circle cx="150" cy="162" r="4" fill="#d7a76e" opacity="0.95"/>
    <circle cx="174" cy="163" r="4" fill="#c49a4e" opacity="0.95"/>
    <circle cx="196" cy="165" r="4" fill="#d7a76e" opacity="0.95"/>

    <!-- ===== ろうそく光・前面グロー（炎の周辺を照らす小さい光） ===== -->
    <g class="ga1"><ellipse cx="108" cy="140" rx="28" ry="22" fill="#ffd54f" opacity="0.28"/></g>
    <g class="ga2"><ellipse cx="127" cy="141" rx="24" ry="19" fill="#ffd54f" opacity="0.28"/></g>
    <g class="ga3"><ellipse cx="150" cy="138" rx="30" ry="24" fill="#ffd54f" opacity="0.30"/></g>
    <g class="ga4"><ellipse cx="173" cy="141" rx="24" ry="19" fill="#ffd54f" opacity="0.28"/></g>
    <g class="ga5"><ellipse cx="192" cy="140" rx="28" ry="22" fill="#ffd54f" opacity="0.28"/></g>

    <!-- ===== ろうそく（5本） ===== -->
    <!-- 1 赤 -->
    <rect x="104.5" y="143" width="7" height="25" rx="3.5" fill="#7f0000"/>
    <ellipse cx="108" cy="143" rx="3.5" ry="2" fill="#bf360c" opacity="0.8"/>
    <!-- wick -->
    <line x1="108" y1="143" x2="108" y2="140" stroke="#212121" stroke-width="1.2" stroke-linecap="round"/>
    <!-- 2 青 -->
    <rect x="123.5" y="144" width="7" height="24" rx="3.5" fill="#0d47a1"/>
    <ellipse cx="127" cy="144" rx="3.5" ry="2" fill="#1565c0" opacity="0.8"/>
    <line x1="127" y1="144" x2="127" y2="141" stroke="#212121" stroke-width="1.2" stroke-linecap="round"/>
    <!-- 3 黄（中央・少し長い） -->
    <rect x="146.5" y="141" width="7" height="27" rx="3.5" fill="#e65100"/>
    <ellipse cx="150" cy="141" rx="3.5" ry="2" fill="#bf360c" opacity="0.8"/>
    <line x1="150" y1="141" x2="150" y2="138" stroke="#212121" stroke-width="1.2" stroke-linecap="round"/>
    <!-- 4 緑 -->
    <rect x="169.5" y="144" width="7" height="24" rx="3.5" fill="#1b5e20"/>
    <ellipse cx="173" cy="144" rx="3.5" ry="2" fill="#2e7d32" opacity="0.8"/>
    <line x1="173" y1="144" x2="173" y2="141" stroke="#212121" stroke-width="1.2" stroke-linecap="round"/>
    <!-- 5 紫 -->
    <rect x="188.5" y="143" width="7" height="25" rx="3.5" fill="#4a148c"/>
    <ellipse cx="192" cy="143" rx="3.5" ry="2" fill="#6a1b9a" opacity="0.8"/>
    <line x1="192" y1="143" x2="192" y2="140" stroke="#212121" stroke-width="1.2" stroke-linecap="round"/>

    <!-- ===== 炎（順番に点火・ゆらゆら） ===== -->
    <!-- 各炎: 外側 <g transform> で位置固定、内側 class="flame-N" で opacity + flicker -->
    <g transform="translate(108, 143)">
      <g class="flame-1">
        <path d="M 0,0 C -5,-4 -6,-10 -3,-15 C -1,-18 0,-21 0,-23 C 0,-21 1,-18 3,-15 C 6,-10 5,-4 0,0 Z" fill="#ff6f00"/>
        <path d="M 0,-2 C -3,-5 -3,-10 -1,-14 C 0,-16 0,-18 0,-19 C 0,-18 0,-16 1,-14 C 3,-10 3,-5 0,-2 Z" fill="#ffee58"/>
        <circle cx="0" cy="-20" r="3" fill="#fff9c4" opacity="0.6"/>
      </g>
    </g>
    <g transform="translate(127, 144)">
      <g class="flame-2">
        <path d="M 0,0 C -5,-4 -6,-10 -3,-15 C -1,-18 0,-21 0,-23 C 0,-21 1,-18 3,-15 C 6,-10 5,-4 0,0 Z" fill="#ff6f00"/>
        <path d="M 0,-2 C -3,-5 -3,-10 -1,-14 C 0,-16 0,-18 0,-19 C 0,-18 0,-16 1,-14 C 3,-10 3,-5 0,-2 Z" fill="#ffee58"/>
        <circle cx="0" cy="-20" r="3" fill="#fff9c4" opacity="0.6"/>
      </g>
    </g>
    <g transform="translate(150, 141)">
      <g class="flame-3">
        <!-- 中央炎は少し大きめ -->
        <path d="M 0,0 C -6,-5 -7,-11 -4,-17 C -2,-20 0,-23 0,-25 C 0,-23 2,-20 4,-17 C 7,-11 6,-5 0,0 Z" fill="#ff6f00"/>
        <path d="M 0,-2 C -4,-6 -4,-11 -2,-16 C -1,-18 0,-20 0,-21 C 0,-20 1,-18 2,-16 C 4,-11 4,-6 0,-2 Z" fill="#ffee58"/>
        <circle cx="0" cy="-22" r="3.5" fill="#fff9c4" opacity="0.65"/>
      </g>
    </g>
    <g transform="translate(173, 144)">
      <g class="flame-4">
        <path d="M 0,0 C -5,-4 -6,-10 -3,-15 C -1,-18 0,-21 0,-23 C 0,-21 1,-18 3,-15 C 6,-10 5,-4 0,0 Z" fill="#ff6f00"/>
        <path d="M 0,-2 C -3,-5 -3,-10 -1,-14 C 0,-16 0,-18 0,-19 C 0,-18 0,-16 1,-14 C 3,-10 3,-5 0,-2 Z" fill="#ffee58"/>
        <circle cx="0" cy="-20" r="3" fill="#fff9c4" opacity="0.6"/>
      </g>
    </g>
    <g transform="translate(192, 143)">
      <g class="flame-5">
        <path d="M 0,0 C -5,-4 -6,-10 -3,-15 C -1,-18 0,-21 0,-23 C 0,-21 1,-18 3,-15 C 6,-10 5,-4 0,0 Z" fill="#ff6f00"/>
        <path d="M 0,-2 C -3,-5 -3,-10 -1,-14 C 0,-16 0,-18 0,-19 C 0,-18 0,-16 1,-14 C 3,-10 3,-5 0,-2 Z" fill="#ffee58"/>
        <circle cx="0" cy="-20" r="3" fill="#fff9c4" opacity="0.6"/>
      </g>
    </g>

  </g>
</svg>
