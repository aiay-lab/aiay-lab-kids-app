<?xml version="1.0" encoding="UTF-8"?>
<!--
  空が晴れる（新案）
  演出: 雨上がりの曇り空 → 雲が左右に割れる → 青空 → 虹が弧を描く → 太陽が輝く
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* ---- 曇り空オーバーレイがフェードアウト ---- */
      .gray-sky {
        animation: fade-out 1.6s ease-in-out 0.5s forwards;
      }
      @keyframes fade-out {
        to { opacity: 0; }
      }

      /* ---- 暗い地面フェードアウト ---- */
      .dark-ground {
        animation: fade-out 1.4s ease-in-out 0.6s forwards;
      }

      /* ---- 左雲が左に流れる ---- */
      .cloud-left {
        animation: go-left 1.4s cubic-bezier(0.4, 0, 1, 1) 0.8s forwards;
      }
      @keyframes go-left {
        to { transform: translateX(-280px); opacity: 0; }
      }

      /* ---- 右雲が右に流れる ---- */
      .cloud-right {
        animation: go-right 1.4s cubic-bezier(0.4, 0, 1, 1) 1.0s forwards;
      }
      @keyframes go-right {
        to { transform: translateX(280px); opacity: 0; }
      }

      /* ---- 雨粒が消えていく ---- */
      .last-drop {
        animation: drop-fade 0.6s ease-out 0.3s forwards;
        opacity: 1;
      }
      @keyframes drop-fade {
        to { opacity: 0; }
      }

      /* ---- 虹が弧を描く（ストローク伸びる演出） ---- */
      .rainbow-arc {
        stroke-dasharray: 380;
        stroke-dashoffset: 380;
        opacity: 0;
        animation: arc-draw 1.2s ease-out var(--arc-delay, 2.2s) forwards;
      }
      @keyframes arc-draw {
        0%   { stroke-dashoffset: 380; opacity: 0.85; }
        100% { stroke-dashoffset: 0;   opacity: 0.72; }
      }

      /* ---- 虹全体がゆっくりフェードイン（arcsのラッパー） ---- */
      .rainbow-group {
        opacity: 0;
        animation: fade-in 0.4s ease-out 2.1s forwards;
      }
      @keyframes fade-in {
        to { opacity: 1; }
      }

      /* ---- 太陽本体 ---- */
      .sun-body {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        transform: scale(0.1);
        opacity: 0;
        animation: sun-pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 2.0s forwards;
      }
      @keyframes sun-pop {
        to { transform: scale(1); opacity: 1; }
      }

      /* ---- 太陽グロー ---- */
      .sun-glow {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        opacity: 0;
        animation:
          sun-pop  0.7s cubic-bezier(0.34,1.56,0.64,1) 2.0s forwards,
          sun-pulse 3s ease-in-out 2.8s infinite;
      }
      @keyframes sun-pulse {
        0%,100% { transform: scale(1);    opacity: 0.22; }
        50%     { transform: scale(1.2);  opacity: 0.10; }
      }

      /* ---- 光線グループ ---- */
      .rays-group {
        transform-origin: 150px 72px;
        opacity: 0;
        animation:
          fade-in   0.6s ease-out 2.5s forwards,
          rays-spin 16s linear   3.1s infinite;
      }
      @keyframes rays-spin {
        to { transform: rotate(360deg); }
      }

      /* ---- 水たまりの光反射（きらきら） ---- */
      .puddle-shine {
        opacity: 0;
        animation: puddle-glint 2s ease-in-out 3.0s infinite alternate;
      }
      @keyframes puddle-glint {
        0%   { opacity: 0; }
        50%  { opacity: 0.55; }
        100% { opacity: 0.25; }
      }

      /* ---- 小鳥 ---- */
      .bird {
        opacity: 0;
        animation: bird-fly var(--dur, 2.4s) ease-in-out var(--delay, 3.2s) forwards;
      }
      @keyframes bird-fly {
        0%   { transform: translateX(-50px); opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateX(360px); opacity: 0; }
      }
    </style>

    <!-- 虹グラデ用: 各弧に個別色 -->
    <radialGradient id="sun-glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fff9c4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g clip-path="url(#frame)">

  <!-- ===== ベース：青空 ===== -->
  <rect width="300" height="300" fill="#29b6f6" rx="20"/>
  <!-- 空のグラデ感 -->
  <rect width="300" height="160" fill="#0288d1" opacity="0.18" rx="20"/>

  <!-- ===== ベース：明るい草地 ===== -->
  <ellipse cx="150" cy="278" rx="148" ry="36" fill="#66bb6a"/>
  <ellipse cx="150" cy="272" rx="142" ry="26" fill="#81c784"/>
  <!-- 水たまり -->
  <ellipse cx="100" cy="272" rx="34" ry="8"  fill="#4dd0e1" opacity="0.55"/>
  <ellipse cx="210" cy="275" rx="24" ry="6"  fill="#4dd0e1" opacity="0.45"/>
  <!-- 水たまりの光反射 -->
  <ellipse class="puddle-shine" cx="94"  cy="269" rx="16" ry="3" fill="#fff" />
  <ellipse class="puddle-shine" cx="205" cy="272" rx="10" ry="2" fill="#fff" style="animation-delay:3.4s"/>

  <!-- ===== 虹 ===== -->
  <g class="rainbow-group">
    <!-- 外から内へ（赤→橙→黄→緑→青→藍→紫） -->
    <path class="rainbow-arc" d="M 18,230 A 138,138 0 0 1 282,230"
          fill="none" stroke="#ef5350" stroke-width="7" stroke-linecap="round" style="--arc-delay:2.15s"/>
    <path class="rainbow-arc" d="M 28,230 A 128,128 0 0 1 272,230"
          fill="none" stroke="#ff7043" stroke-width="6" stroke-linecap="round" style="--arc-delay:2.25s"/>
    <path class="rainbow-arc" d="M 38,230 A 118,118 0 0 1 262,230"
          fill="none" stroke="#ffee58" stroke-width="6" stroke-linecap="round" style="--arc-delay:2.35s"/>
    <path class="rainbow-arc" d="M 48,230 A 108,108 0 0 1 252,230"
          fill="none" stroke="#66bb6a" stroke-width="6" stroke-linecap="round" style="--arc-delay:2.45s"/>
    <path class="rainbow-arc" d="M 58,230 A  98, 98 0 0 1 242,230"
          fill="none" stroke="#42a5f5" stroke-width="5" stroke-linecap="round" style="--arc-delay:2.55s"/>
    <path class="rainbow-arc" d="M 68,230 A  88, 88 0 0 1 232,230"
          fill="none" stroke="#5c6bc0" stroke-width="5" stroke-linecap="round" style="--arc-delay:2.65s"/>
    <path class="rainbow-arc" d="M 77,230 A  79, 79 0 0 1 223,230"
          fill="none" stroke="#ab47bc" stroke-width="4" stroke-linecap="round" style="--arc-delay:2.75s"/>
  </g>

  <!-- ===== 太陽 ===== -->
  <!-- グロー -->
  <circle class="sun-glow" cx="150" cy="72" r="58" fill="url(#sun-glow-grad)"/>
  <!-- 光線 -->
  <g class="rays-group">
    <line x1="188" y1="72"  x2="214" y2="72"  stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="177" y1="99"  x2="196" y2="118" stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="150" y1="110" x2="150" y2="136" stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="123" y1="99"  x2="104" y2="118" stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="112" y1="72"  x2="86"  y2="72"  stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="123" y1="45"  x2="104" y2="26"  stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="150" y1="34"  x2="150" y2="8"   stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="177" y1="45"  x2="196" y2="26"  stroke="#ffe082" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <!-- 太陽本体 -->
  <circle class="sun-body" cx="150" cy="72" r="34" fill="#fff176"/>
  <circle class="sun-body" cx="150" cy="72" r="24" fill="#ffee58" style="animation-delay:2.15s"/>

  <!-- ===== 曇りオーバーレイ（消える） ===== -->
  <rect class="gray-sky" width="300" height="300" fill="#78909c" rx="20"/>
  <ellipse class="dark-ground" cx="150" cy="278" rx="148" ry="36" fill="#546e7a"/>

  <!-- ===== 残り雨粒（すぐ消える） ===== -->
  <line class="last-drop" x1="100" y1="140" x2="97"  y2="156" stroke="#81d4fa" stroke-width="2" stroke-linecap="round"/>
  <line class="last-drop" x1="140" y1="135" x2="137" y2="151" stroke="#81d4fa" stroke-width="2" stroke-linecap="round" style="animation-delay:0.1s"/>
  <line class="last-drop" x1="178" y1="138" x2="175" y2="154" stroke="#81d4fa" stroke-width="2" stroke-linecap="round" style="animation-delay:0.05s"/>

  <!-- ===== 左の雲（流れる） ===== -->
  <g class="cloud-left">
    <ellipse cx="100" cy="110" rx="80"  ry="34" fill="#b0bec5"/>
    <ellipse cx="62"  cy="103" rx="42"  ry="30" fill="#cfd8dc"/>
    <ellipse cx="100" cy="98"  rx="50"  ry="30" fill="#eceff1"/>
    <ellipse cx="74"  cy="91"  rx="32"  ry="23" fill="#ffffff"/>
    <ellipse cx="108" cy="88"  rx="26"  ry="20" fill="#ffffff"/>
  </g>

  <!-- ===== 右の雲（流れる） ===== -->
  <g class="cloud-right">
    <ellipse cx="210" cy="106" rx="72"  ry="30" fill="#b0bec5"/>
    <ellipse cx="246" cy="100" rx="38"  ry="26" fill="#cfd8dc"/>
    <ellipse cx="210" cy="96"  rx="44"  ry="26" fill="#eceff1"/>
    <ellipse cx="228" cy="89"  rx="26"  ry="19" fill="#ffffff"/>
    <ellipse cx="200" cy="87"  rx="20"  ry="16" fill="#ffffff"/>
  </g>

  <!-- ===== 小鳥 ===== -->
  <g class="bird" style="--dur:2.6s; --delay:3.2s">
    <path d="M 42,148 Q 47,143 52,148 Q 57,143 62,148" fill="none" stroke="#0d47a1" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <g class="bird" style="--dur:2.8s; --delay:3.7s">
    <path d="M 38,168 Q 42,164 46,168 Q 50,164 54,168" fill="none" stroke="#1565c0" stroke-width="2.0" stroke-linecap="round"/>
  </g>
</g>
</svg>
