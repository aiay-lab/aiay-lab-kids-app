<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* ======= 画面を横断（速い・軽い） ======= */
      .ne-walk {
        animation: ne-across 2.5s linear infinite;
      }
      @keyframes ne-across {
        0%   { transform: translate(-85px,  225px); }
        100% { transform: translate(365px,  225px); }
      }

      /* ======= 軽い体の上下 ======= */
      .ne-bob {
        animation: ne-bob-a 0.175s ease-in-out infinite alternate;
      }
      @keyframes ne-bob-a {
        0%   { transform: translateY(0); }
        100% { transform: translateY(1.5px); }
      }

      /* ======= 後ろ足（外=位置、内=CSS animate） ======= */
      .ne-lb {
        transform-box: fill-box; transform-origin: 50% 0%;
        animation: ne-lb-a 0.35s ease-in-out infinite alternate;
      }
      @keyframes ne-lb-a {
        0%   { transform: rotate(28deg); }
        100% { transform: rotate(-28deg); }
      }

      /* ======= 前足（逆位相） ======= */
      .ne-lf {
        transform-box: fill-box; transform-origin: 50% 0%;
        animation: ne-lf-a 0.35s ease-in-out infinite alternate;
      }
      @keyframes ne-lf-a {
        0%   { transform: rotate(-28deg); }
        100% { transform: rotate(28deg); }
      }

      /* ======= しっぽ ======= */
      .ne-tail-a {
        transform-box: fill-box; transform-origin: 100% 50%;
        animation: ne-tail-sw 0.6s ease-in-out infinite alternate;
      }
      @keyframes ne-tail-sw {
        0%   { transform: rotate(-14deg); }
        100% { transform: rotate(14deg); }
      }

      /* ======= 鼻がひくひく ======= */
      .ne-nose {
        transform-box: fill-box; transform-origin: 50% 50%;
        animation: ne-nose-tw 0.3s ease-in-out infinite alternate;
      }
      @keyframes ne-nose-tw {
        0%   { transform: scale(0.85); }
        100% { transform: scale(1.15); }
      }

      /* ======= 耳 ======= */
      .ne-ear-a {
        transform-box: fill-box; transform-origin: 50% 100%;
        animation: ne-ear-tw 0.5s ease-in-out infinite alternate;
      }
      @keyframes ne-ear-tw {
        0%   { transform: rotate(-5deg); }
        100% { transform: rotate(5deg); }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 背景 -->
  <rect width="300" height="300" fill="#fff9e6" rx="20"/>
  <!-- 床 -->
  <rect y="248" width="300" height="52" fill="#8d6e63"/>
  <rect y="248" width="300" height="7" fill="#a1887f"/>

  <!-- ===== ねずみグループ（走行） ===== -->
  <g class="ne-walk">
    <!-- 影（local y=23） -->
    <ellipse cx="5" cy="23" rx="20" ry="3" fill="#000" opacity="0.14"/>

    <g class="ne-bob">

      <!-- しっぽ: 外=位置、内=CSS animate -->
      <g transform="translate(-17, 0)">
        <g class="ne-tail-a">
          <path d="M 0,0 C -12,-3 -20,10 -16,20 C -12,30 -22,38 -18,48"
                fill="none" stroke="#9e9e9e" stroke-width="2.8" stroke-linecap="round"/>
        </g>
      </g>

      <!-- 後ろ足: 外=位置 translate(-8,10)、内=CSS rotate -->
      <g transform="translate(-8, 10)">
        <g class="ne-lb">
          <rect x="-5" y="1" width="5" height="13" fill="#9e9e9e" rx="2.5" opacity="0.6"/>
          <rect x="-2" y="0" width="5" height="13" fill="#bdbdbd" rx="2.5"/>
        </g>
      </g>

      <!-- 前足: 外=位置 translate(12,10)、内=CSS rotate -->
      <g transform="translate(12, 10)">
        <g class="ne-lf">
          <rect x="-5" y="1" width="5" height="13" fill="#9e9e9e" rx="2.5" opacity="0.6"/>
          <rect x="-2" y="0" width="5" height="13" fill="#bdbdbd" rx="2.5"/>
        </g>
      </g>

      <!-- 体 -->
      <ellipse cx="0" cy="0" rx="17" ry="10" fill="#bdbdbd"/>
      <ellipse cx="1" cy="3" rx="11" ry="6" fill="#d4d4d4" opacity="0.5"/>

      <!-- 遠い耳 -->
      <circle cx="16" cy="-15" r="8" fill="#9e9e9e"/>
      <circle cx="16" cy="-15" r="4.5" fill="#e8a0b4" opacity="0.7"/>

      <!-- 頭 -->
      <circle cx="22" cy="-3" r="13" fill="#bdbdbd"/>

      <!-- 近い耳: 外=位置、内=CSS animate -->
      <g transform="translate(25, -15)">
        <g class="ne-ear-a">
          <circle cx="0" cy="0" r="9" fill="#d0d0d0"/>
          <circle cx="0" cy="0" r="5.5" fill="#f8bbd9"/>
        </g>
      </g>

      <!-- 目 -->
      <circle cx="30" cy="-7" r="3.5" fill="#fff"/>
      <circle cx="31" cy="-7" r="2.2" fill="#111827"/>
      <circle cx="29.5" cy="-8" r="1" fill="#fff"/>

      <!-- ひげ -->
      <line x1="32" y1="-4" x2="46" y2="-6" stroke="#9e9e9e" stroke-width="0.9" opacity="0.8"/>
      <line x1="32" y1="-3" x2="47" y2="-3" stroke="#9e9e9e" stroke-width="0.9" opacity="0.8"/>
      <line x1="32" y1="-2" x2="46" y2="-0.5" stroke="#9e9e9e" stroke-width="0.9" opacity="0.8"/>

      <!-- 鼻 -->
      <ellipse class="ne-nose" cx="35" cy="-3" rx="3.2" ry="2.2" fill="#e91e63" opacity="0.85"/>

    </g><!-- / ne-bob -->
  </g><!-- / ne-walk -->
</g>
</svg>
