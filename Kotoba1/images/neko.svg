<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* 尻尾が左右に揺れる */
      .tail {
        transform-box: fill-box;
        transform-origin: 0% 100%;
        animation: tail-sway 2.5s ease-in-out infinite;
      }
      @keyframes tail-sway {
        0%, 100% { transform: rotate(-22deg); }
        50%      { transform: rotate(22deg); }
      }
      /* まばたき */
      .eye {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: blink 4s ease-in-out infinite;
      }
      .eye-r { animation-delay: 0.06s; }
      @keyframes blink {
        0%, 44%, 56%, 100% { transform: scaleY(1); }
        50%                 { transform: scaleY(0.08); }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 背景（クリーム） -->
  <rect width="300" height="300" fill="#fff9e6"/>

  <!-- 床（木目） -->
  <rect y="255" width="300" height="45" fill="#c8a060"/>
  <rect y="253" width="300" height="4" fill="#b08040"/>
  <line x1="0"   y1="263" x2="300" y2="263" stroke="#a07030" stroke-width="1"/>
  <line x1="0"   y1="274" x2="300" y2="274" stroke="#a07030" stroke-width="1"/>
  <line x1="80"  y1="255" x2="83"  y2="300" stroke="#a07030" stroke-width="0.5"/>
  <line x1="200" y1="255" x2="203" y2="300" stroke="#a07030" stroke-width="0.5"/>

  <!-- 尻尾（体より先にrender→体の下に表示） -->
  <g class="tail">
    <path d="M 198,232 C 238,210 264,170 252,136 C 246,116 222,122 225,140
             C 228,158 248,150 242,172 C 237,190 212,210 198,232 Z"
          fill="#e8922a"/>
    <ellipse cx="248" cy="130" rx="9" ry="9" fill="#f5e0b0"/>
  </g>

  <!-- 体 -->
  <ellipse cx="150" cy="215" rx="65" ry="57" fill="#f0a030"/>

  <!-- お腹（明るいクリーム） -->
  <ellipse cx="150" cy="228" rx="38" ry="40" fill="#f5d080"/>

  <!-- 頭 -->
  <circle cx="150" cy="140" r="56" fill="#f0a030"/>

  <!-- 耳（左） -->
  <polygon points="105,112 94,68 130,98" fill="#f0a030"/>
  <polygon points="109,109 103,78 128,99" fill="#f5b8b8"/>

  <!-- 耳（右） -->
  <polygon points="195,112 206,68 170,98" fill="#f0a030"/>
  <polygon points="191,109 197,78 172,99" fill="#f5b8b8"/>

  <!-- 頭のしま模様 -->
  <path d="M 133,97 C 135,85 136,79 134,72" stroke="#c87818" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 148,95 C 149,83 149,77 148,70" stroke="#c87818" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 162,95 C 163,83 164,77 165,70" stroke="#c87818" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 168,97 C 170,85 171,79 172,72" stroke="#c87818" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- 目（左） -->
  <g class="eye">
    <ellipse cx="130" cy="136" rx="13" ry="14" fill="#3d7a30"/>
    <ellipse cx="130" cy="136" rx="6"  ry="12" fill="#1a1a1a"/>
    <circle  cx="133" cy="131" r="3.5" fill="white"/>
  </g>

  <!-- 目（右） -->
  <g class="eye eye-r">
    <ellipse cx="170" cy="136" rx="13" ry="14" fill="#3d7a30"/>
    <ellipse cx="170" cy="136" rx="6"  ry="12" fill="#1a1a1a"/>
    <circle  cx="173" cy="131" r="3.5" fill="white"/>
  </g>

  <!-- 鼻 -->
  <polygon points="150,156 143,163 157,163" fill="#f48fb1"/>
  <line x1="150" y1="156" x2="150" y2="160" stroke="#c06090" stroke-width="1.5"/>

  <!-- 口 -->
  <path d="M 143,163 Q 150,171 157,163" stroke="#c47030" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ひげ（左） -->
  <line x1="138" y1="157" x2="98"  y2="150" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="138" y1="162" x2="97"  y2="162" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="139" y1="167" x2="100" y2="174" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ひげ（右） -->
  <line x1="162" y1="157" x2="202" y2="150" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="162" y1="162" x2="203" y2="162" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="161" y1="167" x2="200" y2="174" stroke="#bbb" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 前足（左） -->
  <ellipse cx="112" cy="262" rx="24" ry="15" fill="#f0a030"/>
  <ellipse cx="112" cy="265" rx="19" ry="11" fill="#f5d080"/>

  <!-- 前足（右） -->
  <ellipse cx="188" cy="262" rx="24" ry="15" fill="#f0a030"/>
  <ellipse cx="188" cy="265" rx="19" ry="11" fill="#f5d080"/>

  </g>
</svg>
