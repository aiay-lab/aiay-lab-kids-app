<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* ======= 画面を横断（遅い・重い） ======= */
      .zou-walk {
        animation: zou-across 9s linear infinite;
      }
      @keyframes zou-across {
        0%   { transform: translate(-280px, 131px); }
        100% { transform: translate(600px,  131px); }
      }

      /* ======= 重い体の上下 ======= */
      .zou-bob {
        animation: zou-bob-a 0.5s ease-in-out infinite alternate;
      }
      @keyframes zou-bob-a {
        0%   { transform: translateY(0); }
        100% { transform: translateY(6px); }
      }

      /* ======= 足のアニメーション（CSS のみ・位置指定は outer SVG group で） ======= */
      .leg-b {
        transform-box: fill-box; transform-origin: 50% 0%;
        animation: lb 1s ease-in-out infinite alternate;
      }
      @keyframes lb {
        0%   { transform: rotate(18deg); }
        100% { transform: rotate(-18deg); }
      }
      .leg-f {
        transform-box: fill-box; transform-origin: 50% 0%;
        animation: lf 1s ease-in-out infinite alternate;
      }
      @keyframes lf {
        0%   { transform: rotate(-18deg); }
        100% { transform: rotate(18deg); }
      }

      /* ======= 鼻が揺れる ======= */
      .trunk-a {
        transform-box: fill-box; transform-origin: 0% 0%;
        animation: tr-sw 3s ease-in-out infinite alternate;
      }
      @keyframes tr-sw {
        0%   { transform: rotate(-12deg); }
        100% { transform: rotate(12deg); }
      }

      /* ======= 耳がパタパタ ======= */
      .ear-a {
        transform-box: fill-box; transform-origin: 50% 0%;
        animation: ear-sw 2s ease-in-out infinite alternate;
      }
      @keyframes ear-sw {
        0%   { transform: rotate(-6deg); }
        100% { transform: rotate(8deg); }
      }

      /* ======= しっぽ ======= */
      .tail-a {
        transform-box: fill-box; transform-origin: 100% 100%;
        animation: tail-sw 1.5s ease-in-out infinite alternate;
      }
      @keyframes tail-sw {
        0%   { transform: rotate(-20deg); }
        100% { transform: rotate(20deg); }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 背景 -->
  <rect width="300" height="300" fill="#fff9e6" rx="20"/>
  <!-- 床 -->
  <rect y="248" width="300" height="52" fill="#8d6e63"/>
  <rect y="248" width="300" height="7" fill="#a1887f"/>

  <!-- ===== 象グループ（歩行） ===== -->
  <g class="zou-walk">

    <!-- 影（zou-walk 座標系で床面 = local y=117） -->
    <ellipse cx="8" cy="117" rx="92" ry="11" fill="#000" opacity="0.13"/>

    <g class="zou-bob">

      <!-- しっぽ: 外グループ=位置(SVG attr), 内グループ=CSS アニメ -->
      <g transform="translate(-80, -4)">
        <g class="tail-a">
          <path d="M 0,0 C -10,-7 -14,-18 -8,-28"
                fill="none" stroke="#546e7a" stroke-width="6" stroke-linecap="round"/>
          <circle cx="-8" cy="-28" r="9" fill="#546e7a"/>
          <circle cx="-8" cy="-28" r="5.5" fill="#607d8b"/>
        </g>
      </g>

      <!-- 後ろ足: 外=位置 translate(-36,54)、内=CSS rotate -->
      <g transform="translate(-36, 54)">
        <g class="leg-b">
          <rect x="-18" y="2" width="22" height="65" fill="#455a64" rx="10" opacity="0.6"/>
          <rect x="-11" y="0" width="22" height="65" fill="#546e7a" rx="10"/>
          <rect x="-11" y="53" width="22" height="12" fill="#37474f" rx="6"/>
        </g>
      </g>

      <!-- 前足: 外=位置 translate(36,54)、内=CSS rotate -->
      <g transform="translate(36, 54)">
        <g class="leg-f">
          <rect x="-18" y="2" width="22" height="65" fill="#546e7a" rx="10" opacity="0.6"/>
          <rect x="-11" y="0" width="22" height="65" fill="#78909c" rx="10"/>
          <rect x="-11" y="53" width="22" height="12" fill="#607d8b" rx="6"/>
        </g>
      </g>

      <!-- 体 -->
      <ellipse cx="0" cy="0" rx="82" ry="54" fill="#78909c"/>
      <ellipse cx="4" cy="20" rx="54" ry="26" fill="#90a4ae" opacity="0.28"/>

      <!-- 遠い耳（頭より後ろに描く） -->
      <ellipse cx="74" cy="-44" rx="22" ry="32" fill="#607d8b"/>

      <!-- 頭 -->
      <circle cx="85" cy="-20" r="40" fill="#78909c"/>

      <!-- 近い耳: 外=位置、内=CSS rotate -->
      <g transform="translate(72, -52)">
        <g class="ear-a">
          <ellipse cx="0" cy="8" rx="30" ry="42" fill="#90a4ae"/>
          <ellipse cx="0" cy="8" rx="19" ry="27" fill="#f48fb1" opacity="0.45"/>
        </g>
      </g>

      <!-- 象牙 -->
      <path d="M 108,-18 Q 132,-12 135,2"
            fill="none" stroke="#fffde7" stroke-width="7" stroke-linecap="round"/>

      <!-- 目 -->
      <circle cx="115" cy="-28" r="7.5" fill="#fff"/>
      <circle cx="116" cy="-28" r="4.8" fill="#1a237e"/>
      <circle cx="114" cy="-30" r="1.8" fill="#fff"/>
      <!-- まつげ -->
      <path d="M 109,-38 Q 116,-43 123,-38"
            stroke="#455a64" stroke-width="2" fill="none" stroke-linecap="round"/>

      <!-- 鼻（trunk）: 外=位置 translate(120,-8)、内=CSS rotate
           鼻の長さ: 110px（床面近くまで届く）＋先端を少しカール -->
      <g transform="translate(120, -8)">
        <g class="trunk-a">
          <path d="M 0,0 C 18,36 15,78 2,110 C -2,120 -12,120 -10,110"
                fill="none" stroke="#78909c" stroke-width="18" stroke-linecap="round"/>
          <!-- しわ（3本） -->
          <path d="M 9,30 Q 17,33 18,37"  stroke="#607d8b" stroke-width="2" fill="none" opacity="0.55"/>
          <path d="M 6,58 Q 13,61 13,65"  stroke="#607d8b" stroke-width="2" fill="none" opacity="0.55"/>
          <path d="M 2,86 Q 8,89 8,93"    stroke="#607d8b" stroke-width="2" fill="none" opacity="0.55"/>
          <!-- 先端（鼻の穴） -->
          <circle cx="-8" cy="111" r="6" fill="#546e7a"/>
        </g>
      </g>

    </g><!-- / zou-bob -->
  </g><!-- / zou-walk -->
</g>
</svg>
