<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* ======= タオルがゆれる ======= */
      .towel-group {
        transform-box: fill-box;
        transform-origin: 50% 0%;
        animation: towel-sway 0.5s ease-in-out infinite alternate;
      }
      @keyframes towel-sway {
        from { transform: rotate(-3deg); }
        to   { transform: rotate(3deg); }
      }

      /* ======= 手が上がってくる ======= */
      .hands-group {
        animation: hands-rise 7s ease-in-out infinite;
      }
      @keyframes hands-rise {
        0%,10%  { transform: translateY(130px); }
        18%,78% { transform: translateY(0); }
        86%     { transform: translateY(130px); }
        100%    { transform: translateY(130px); }
      }

      /* ======= 手を上下にふく ======= */
      .hand-wipe {
        animation: wipe-motion 0.48s ease-in-out infinite alternate;
      }
      @keyframes wipe-motion {
        from { transform: translateY(-12px); }
        to   { transform: translateY(12px); }
      }
      .hand-wipe2 {
        animation: wipe-motion 0.48s ease-in-out infinite alternate-reverse;
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- タイル壁 -->
  <rect width="300" height="300" fill="#f5f5f5" rx="20"/>
  <rect width="300" height="200" fill="#fafafa"/>
  <!-- タイル目地（横） -->
  <line x1="0" y1="67" x2="300" y2="67" stroke="#e0e0e0" stroke-width="1.5"/>
  <line x1="0" y1="134" x2="300" y2="134" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- タイル目地（縦） -->
  <line x1="75"  y1="0" x2="75"  y2="200" stroke="#e0e0e0" stroke-width="1.5"/>
  <line x1="150" y1="0" x2="150" y2="200" stroke="#e0e0e0" stroke-width="1.5"/>
  <line x1="225" y1="0" x2="225" y2="200" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- 床 -->
  <rect y="198" width="300" height="102" fill="#bdbdbd"/>
  <rect y="198" width="300" height="9"   fill="#e0e0e0"/>

  <!-- ===== タオルバー ===== -->
  <!-- ブラケット（左） -->
  <rect x="55"  y="90" width="12" height="28" fill="#9e9e9e" rx="4"/>
  <rect x="51"  y="88" width="20" height="8"  fill="#9e9e9e" rx="3"/>
  <!-- ブラケット（右） -->
  <rect x="233" y="90" width="12" height="28" fill="#9e9e9e" rx="4"/>
  <rect x="229" y="88" width="20" height="8"  fill="#9e9e9e" rx="3"/>
  <!-- バー本体 -->
  <rect x="64" y="96" width="172" height="12" fill="#b0bec5" rx="6"/>
  <!-- バーの光沢 -->
  <rect x="64" y="96" width="172" height="4"  fill="#cfd8dc" rx="6" opacity="0.7"/>

  <!-- ===== タオル ===== -->
  <g class="towel-group">
    <!-- タオル本体 -->
    <rect x="100" y="107" width="100" height="105" fill="#ef5350" rx="5"/>
    <!-- タオルのストライプ（上部） -->
    <rect x="100" y="115" width="100" height="10" fill="#c62828" rx="2"/>
    <!-- タオルのストライプ（下部） -->
    <rect x="100" y="193" width="100" height="10" fill="#c62828" rx="2"/>
    <!-- タオルのテクスチャ（縦線） -->
    <line x1="116" y1="128" x2="116" y2="192" stroke="#e57373" stroke-width="1.5" opacity="0.5"/>
    <line x1="132" y1="128" x2="132" y2="192" stroke="#e57373" stroke-width="1.5" opacity="0.5"/>
    <line x1="148" y1="128" x2="148" y2="192" stroke="#e57373" stroke-width="1.5" opacity="0.5"/>
    <line x1="164" y1="128" x2="164" y2="192" stroke="#e57373" stroke-width="1.5" opacity="0.5"/>
    <line x1="180" y1="128" x2="180" y2="192" stroke="#e57373" stroke-width="1.5" opacity="0.5"/>
    <!-- タオル上部折り返し（バーに掛かっている部分） -->
    <rect x="100" y="107" width="100" height="12" fill="#c62828" rx="5"/>
  </g>

  <!-- ===== 手グループ ===== -->
  <g class="hands-group">
    <!-- 右手（手前） -->
    <g transform="translate(172, 195)">
      <g class="hand-wipe">
        <ellipse cx="0" cy="0" rx="24" ry="14" fill="#ffcc80"/>
        <rect x="-8"  y="-28" width="9" height="22" fill="#ffcc80" rx="4"/>
        <rect x="2"   y="-32" width="9" height="24" fill="#ffcc80" rx="4"/>
        <rect x="12"  y="-30" width="8" height="22" fill="#ffcc80" rx="4"/>
        <rect x="21"  y="-24" width="7" height="16" fill="#ffcc80" rx="3"/>
        <rect x="-21" y="-7"  width="14" height="9" fill="#ffcc80" rx="4"/>
      </g>
    </g>

    <!-- 左手（奥・少し暗い色） -->
    <g transform="translate(128, 195)">
      <g class="hand-wipe2">
        <ellipse cx="0" cy="0" rx="24" ry="14" fill="#ffb74d"/>
        <rect x="0"   y="-28" width="9" height="22" fill="#ffb74d" rx="4"/>
        <rect x="-10" y="-32" width="9" height="24" fill="#ffb74d" rx="4"/>
        <rect x="-20" y="-30" width="8" height="22" fill="#ffb74d" rx="4"/>
        <rect x="-28" y="-24" width="7" height="16" fill="#ffb74d" rx="3"/>
        <rect x="8"   y="-7"  width="14" height="9" fill="#ffb74d" rx="4"/>
      </g>
    </g>
  </g>
</g>
</svg>
