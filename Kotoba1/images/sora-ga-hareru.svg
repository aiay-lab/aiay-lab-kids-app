<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* 曇り空がフェードアウト */
      .sky-gray {
        animation: fade-out 1.4s ease-in-out 0.8s forwards;
      }
      /* 暗い地面がフェードアウト */
      .ground-dark {
        animation: fade-out 1.2s ease-in-out 0.9s forwards;
      }
      @keyframes fade-out {
        to { opacity: 0; }
      }

      /* 雲が左に流れる */
      .cloud-l {
        animation: go-left 1.1s ease-in 0.3s forwards;
      }
      @keyframes go-left {
        to { transform: translateX(-260px); opacity: 0; }
      }

      /* 雲が右に流れる */
      .cloud-r {
        animation: go-right 1.1s ease-in 0.5s forwards;
      }
      @keyframes go-right {
        to { transform: translateX(260px); opacity: 0; }
      }

      /* 太陽が出てくる */
      .sun-body {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        transform: scale(0.1);
        opacity: 0;
        animation: sun-pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s forwards;
      }
      @keyframes sun-pop {
        to { transform: scale(1); opacity: 1; }
      }

      /* 光線グループ: フェードイン → ゆっくり回転 */
      .rays-group {
        transform-origin: 150px 90px;
        opacity: 0;
        animation:
          rays-appear 0.6s ease-out 1.7s forwards,
          rays-rotate 14s linear 2.3s infinite;
      }
      @keyframes rays-appear {
        to { opacity: 1; }
      }
      @keyframes rays-rotate {
        to { transform: rotate(360deg); }
      }

      /* 太陽がゆっくり輝く */
      .sun-glow {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        opacity: 0;
        animation:
          sun-pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s forwards,
          sun-pulse 3s ease-in-out 2.0s infinite;
      }
      @keyframes sun-pulse {
        0%,100% { transform: scale(1);    opacity: 0.25; }
        50%     { transform: scale(1.18); opacity: 0.10; }
      }

      /* 小鳥が飛ぶ */
      .bird {
        opacity: 0;
        animation: bird-fly var(--dur, 2.2s) ease-in-out var(--delay, 2.5s) forwards;
      }
      @keyframes bird-fly {
        0%   { transform: translateX(-40px); opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateX(340px); opacity: 0; }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- ===== 青空（ベース、常に表示） ===== -->
  <rect width="300" height="300" fill="#42a5f5" rx="20"/>

  <!-- 明るい草地（ベース） -->
  <ellipse cx="150" cy="278" rx="148" ry="38" fill="#66bb6a"/>
  <ellipse cx="150" cy="273" rx="142" ry="28" fill="#81c784"/>

  <!-- ===== 曇りレイヤー（フェードアウト） ===== -->
  <rect class="sky-gray" width="300" height="300" fill="#78909c" rx="20"/>
  <ellipse class="ground-dark" cx="150" cy="278" rx="148" ry="38" fill="#546e7a"/>

  <!-- ===== 太陽（雲が去ったあとに出てくる） ===== -->
  <!-- 光のにじみ -->
  <circle class="sun-glow" cx="150" cy="90" r="62" fill="#fff9c4"/>
  <!-- 光線 -->
  <g class="rays-group">
    <line x1="190" y1="90"  x2="218" y2="90"  stroke="#ffe082" stroke-width="4" stroke-linecap="round"/>
    <line x1="178" y1="118" x2="198" y2="138" stroke="#ffe082" stroke-width="4" stroke-linecap="round"/>
    <line x1="150" y1="130" x2="150" y2="158" stroke="#ffe082" stroke-width="4" stroke-linecap="round"/>
    <line x1="122" y1="118" x2="102" y2="138" stroke="#ffe082" stroke-width="4" stroke-linecap="round"/>
    <line x1="110" y1="90"  x2="82"  y2="90"  stroke="#ffe082" stroke-width="4" stroke-linecap="round"/>
    <line x1="122" y1="62"  x2="102" y2="42"  stroke="#ffe082" stroke-width="4" stroke-linecap="round"/>
    <line x1="150" y1="50"  x2="150" y2="22"  stroke="#ffe082" stroke-width="4" stroke-linecap="round"/>
    <line x1="178" y1="62"  x2="198" y2="42"  stroke="#ffe082" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- 太陽本体 -->
  <circle class="sun-body" cx="150" cy="90" r="36" fill="#fff176"/>
  <circle class="sun-body" cx="150" cy="90" r="26" fill="#ffee58" style="animation-delay: 1.25s"/>

  <!-- ===== 雲（左右に流れる） ===== -->
  <!-- 左の大きな雲 -->
  <g class="cloud-l">
    <ellipse cx="118" cy="95"  rx="75" ry="30" fill="#b0bec5"/>
    <ellipse cx="80"  cy="89"  rx="38" ry="26" fill="#cfd8dc"/>
    <ellipse cx="118" cy="83"  rx="44" ry="26" fill="#eceff1"/>
    <ellipse cx="95"  cy="77"  rx="28" ry="20" fill="#ffffff"/>
    <ellipse cx="128" cy="74"  rx="24" ry="18" fill="#ffffff"/>
  </g>
  <!-- 右の中くらいの雲 -->
  <g class="cloud-r">
    <ellipse cx="205" cy="92"  rx="62" ry="26" fill="#b0bec5"/>
    <ellipse cx="240" cy="87"  rx="34" ry="23" fill="#cfd8dc"/>
    <ellipse cx="205" cy="82"  rx="36" ry="22" fill="#eceff1"/>
    <ellipse cx="220" cy="76"  rx="22" ry="17" fill="#ffffff"/>
  </g>

  <!-- ===== 小鳥が飛ぶ ===== -->
  <!-- 鳥1 -->
  <g class="bird" style="--dur:2.4s; --delay:2.2s">
    <path d="M 60,145 Q 65,140 70,145 Q 75,140 80,145" fill="none" stroke="#1565c0" stroke-width="2.2" stroke-linecap="round"/>
  </g>
  <!-- 鳥2 -->
  <g class="bird" style="--dur:2.6s; --delay:2.6s">
    <path d="M 55,162 Q 59,158 63,162 Q 67,158 71,162" fill="none" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>
  </g>
</g>
</svg>
