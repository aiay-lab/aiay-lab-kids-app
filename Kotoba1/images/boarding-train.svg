<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    
    <style>
      .bg-station { fill: #f5f5f5; }
      .train-door-left { animation: door-open-left 8s infinite ease-in-out; }
      .train-door-right { animation: door-open-right 8s infinite ease-in-out; }
      @keyframes door-open-left {
        0%, 5%, 95%, 100% { transform: translateX(0); }
        15%, 85% { transform: translateX(-32px); }
      }
      @keyframes door-open-right {
        0%, 5%, 95%, 100% { transform: translateX(0); }
        15%, 85% { transform: translateX(32px); }
      }
      .child-group { animation: walk-in 8s infinite ease-in-out; }
      @keyframes walk-in {
        0% { transform: translate(195px, 260px); opacity: 0; }
        10% { opacity: 1; }
        20% { transform: translate(195px, 240px); opacity: 1; }
        60% { transform: translate(195px, 175px) scale(0.8); opacity: 1; }
        75% { transform: translate(195px, 165px) scale(0.7); opacity: 0; }
        100% { transform: translate(195px, 260px); opacity: 0; }
      }
      .leg { transform-box: fill-box; transform-origin: 50% 0%; }
      .leg-l { animation: leg-swing 0.6s infinite ease-in-out; }
      .leg-r { animation: leg-swing 0.6s infinite ease-in-out reverse; }
      @keyframes leg-swing {
        0%, 100% { transform: rotate(-15deg); }
        50% { transform: rotate(15deg); }
      }
      .headlight { animation: light-blink 2s infinite alternate; }
      @keyframes light-blink {
        from { fill: #fff9c4; filter: blur(1px); }
        to { fill: #ffffff; filter: blur(3px); }
      }
    </style>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="300" height="300" class="bg-station" />
    <rect x="0" y="0" width="300" height="180" fill="#90a4ae" />

    <g transform="translate(10, 20)">
      <rect x="70" y="0" width="220" height="150" fill="#eceff1" rx="5" />
      <rect x="70" y="35" width="220" height="18" fill="#1565c0" />
      <path d="M 70,0 C 20,0 5,60 5,90 C 5,130 30,150 70,150 Z" fill="#1565c0" />
      <path d="M 65,15 C 35,15 25,35 25,55 L 65,55 Z" fill="#b3e5fc" stroke="#0d47a1" stroke-width="1" />
      <rect class="headlight" x="15" y="105" width="18" height="10" rx="5" fill="#fff9c4" />

      <!-- 入り口（車内の詳細を追加） -->
      <g transform="translate(155, 45)">
        <rect x="0" y="0" width="70" height="105" fill="#e1f5fe" /> <!-- 明るい車内 -->
        <rect x="45" y="60" width="25" height="45" fill="#1e88e5" rx="2" /> <!-- ちらっと見える座席 -->
        <line x1="10" y1="0" x2="10" y2="105" stroke="#b0bec5" stroke-width="2" /> <!-- つり革の棒 -->
        
        <g class="train-door-left">
          <rect x="0" y="0" width="35" height="105" fill="#b0bec5" stroke="#78909c" />
          <rect x="7.5" y="15" width="20" height="40" rx="2" fill="#e1f5fe" />
        </g>
        <g class="train-door-right">
          <rect x="35" y="0" width="35" height="105" fill="#b0bec5" stroke="#78909c" />
          <rect x="42.5" y="15" width="20" height="40" rx="2" fill="#e1f5fe" />
        </g>
      </g>
    </g>

    <rect x="0" y="170" width="300" height="130" fill="#b0b0b0" />
    <rect x="0" y="185" width="300" height="15" fill="#fbc02d" />

    <g class="child-group">
      <rect class="leg leg-l" x="-10" y="-2" width="8" height="20" fill="#5d4037" rx="2" />
      <rect class="leg leg-r" x="2" y="-2" width="8" height="20" fill="#5d4037" rx="2" />
      <path d="M -15,0 Q 0,-35 15,0 Z" fill="#4fc3f7" />
      <circle cx="0" cy="-40" r="15" fill="#ffcc80" />
      <path d="M -15,-40 Q -15,-58 0,-58 Q 15,-58 15,-40 Z" fill="#5d4037" />
      <rect x="-10" y="-30" width="20" height="18" rx="2" fill="#ff7043" />
    </g>
  </g>
</svg>