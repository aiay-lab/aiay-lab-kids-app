<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* 金魚が左右に泳ぐ */
      .fish-swim {
        animation: swim 4s ease-in-out infinite;
      }
      @keyframes swim {
        0%, 100% { transform: translateX(-38px); }
        50%      { transform: translateX(38px); }
      }
      /* 尾びれがゆらゆら */
      .fish-tail {
        transform-box: fill-box;
        transform-origin: 100% 50%;
        animation: tail-wag 0.45s ease-in-out infinite alternate;
      }
      @keyframes tail-wag {
        from { transform: rotate(-22deg); }
        to   { transform: rotate(22deg); }
      }
      /* 泡が上がる */
      .bubble { animation: bubble-up 3s ease-in infinite; }
      .b2     { animation-delay: 1s; }
      .b3     { animation-delay: 2s; }
      @keyframes bubble-up {
        0%   { transform: translateY(0);      opacity: 0.8; }
        80%  { transform: translateY(-155px); opacity: 0.3; }
        100% { transform: translateY(-175px); opacity: 0; }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 水（青） -->
  <rect width="300" height="300" fill="#4fc3f7"/>

  <!-- 深い水（下ほど暗め） -->
  <rect y="190" width="300" height="110" fill="#0288d1" opacity="0.30"/>

  <!-- 水面の光の反射 -->
  <ellipse cx="80"  cy="18" rx="45" ry="8"  fill="white" opacity="0.22"/>
  <ellipse cx="205" cy="32" rx="38" ry="6"  fill="white" opacity="0.18"/>
  <ellipse cx="148" cy="10" rx="26" ry="5"  fill="white" opacity="0.15"/>

  <!-- 砂利（底） -->
  <rect y="266" width="300" height="34" fill="#b8a070"/>
  <ellipse cx="28"  cy="266" rx="20" ry="6" fill="#a89060"/>
  <ellipse cx="80"  cy="268" rx="16" ry="5" fill="#c0a878"/>
  <ellipse cx="140" cy="266" rx="22" ry="6" fill="#a89060"/>
  <ellipse cx="196" cy="267" rx="17" ry="5" fill="#c0a878"/>
  <ellipse cx="250" cy="266" rx="20" ry="6" fill="#a89060"/>
  <ellipse cx="285" cy="268" rx="14" ry="5" fill="#c0a878"/>

  <!-- 水草（左） -->
  <path d="M 52,266 C 47,238 56,210 46,184 C 41,168 30,166 33,179 C 36,192 52,196 48,217 C 45,233 38,248 52,266"
        fill="#4caf50"/>
  <path d="M 67,266 C 72,236 62,206 69,178 C 73,162 84,160 82,175 C 80,190 66,195 69,218 C 72,236 80,250 67,266"
        fill="#66bb6a"/>

  <!-- 水草（右） -->
  <path d="M 240,266 C 236,240 245,214 238,188 C 234,172 223,170 226,184 C 229,197 240,200 238,222 C 236,238 228,252 240,266"
        fill="#4caf50"/>
  <path d="M 255,266 C 260,238 250,210 258,186 C 263,170 273,168 271,182 C 269,196 256,200 259,222 C 262,240 269,255 255,266"
        fill="#66bb6a"/>

  <!-- 泡 -->
  <circle class="bubble"    cx="98"  cy="222" r="5"   fill="none" stroke="white" stroke-width="1.5"/>
  <circle class="bubble b2" cx="158" cy="202" r="4"   fill="none" stroke="white" stroke-width="1.5"/>
  <circle class="bubble b3" cx="216" cy="217" r="3.5" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- ========== 金魚グループ（泳ぐ） ========== -->
  <g class="fish-swim">

    <!-- 尾びれ（体より先にrender→体の後ろ） -->
    <g class="fish-tail">
      <path d="M 93,155 C 56,138 40,116 46,100 C 52,84 74,90 93,155 Z"  fill="#e53935"/>
      <path d="M 93,155 C 52,168 36,190 42,206 C 48,222 72,214 93,155 Z" fill="#ef5350"/>
    </g>

    <!-- 体（金魚・オレンジ赤） -->
    <ellipse cx="152" cy="155" rx="60" ry="36" fill="#ff6d00"/>

    <!-- お腹（明るい） -->
    <ellipse cx="157" cy="165" rx="46" ry="25" fill="#ffab40"/>

    <!-- 背びれ -->
    <path d="M 130,119 C 140,99 162,94 178,108 C 167,113 150,118 130,119 Z" fill="#d84315"/>

    <!-- 胸びれ（腹） -->
    <path d="M 138,177 C 122,190 116,204 127,209 C 138,214 148,198 138,177 Z" fill="#ef5350"/>

    <!-- うろこ模様 -->
    <path d="M 143,131 C 147,120 156,120 161,126" stroke="#d84315" stroke-width="1.5" fill="none"/>
    <path d="M 160,128 C 164,117 173,117 178,123" stroke="#d84315" stroke-width="1.5" fill="none"/>
    <path d="M 130,143 C 134,132 143,132 148,138" stroke="#d84315" stroke-width="1.5" fill="none"/>
    <path d="M 148,140 C 152,129 161,129 166,135" stroke="#d84315" stroke-width="1.5" fill="none"/>

    <!-- 目 -->
    <circle cx="192" cy="148" r="12" fill="white"/>
    <circle cx="194" cy="148" r="8"  fill="#1a1a1a"/>
    <circle cx="196" cy="145" r="2.5" fill="white"/>

    <!-- 口 -->
    <path d="M 207,156 Q 212,161 207,166"
          stroke="#bf360c" stroke-width="2" fill="none" stroke-linecap="round"/>

  </g>

  </g>
</svg>
