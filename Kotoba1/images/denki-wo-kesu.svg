<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      .dark-overlay {
        animation: overlay-anim 7s infinite;
        opacity: 0;
      }
      @keyframes overlay-anim {
        0%,14%   { opacity: 0; }
        22%      { opacity: 0.85; }
        88%      { opacity: 0.85; }
        93%      { opacity: 0; }
        100%     { opacity: 0; }
      }
      .bright-wash {
        animation: wash-anim 7s infinite;
        opacity: 0.38;
      }
      @keyframes wash-anim {
        0%,14%   { opacity: 0.38; }
        22%,88%  { opacity: 0; }
        93%      { opacity: 0.38; }
        100%     { opacity: 0.38; }
      }
      .bulb {
        animation: bulb-anim 7s infinite;
      }
      @keyframes bulb-anim {
        0%,16%   { fill: #fff176; }
        21%,88%  { fill: #9e9e9e; }
        93%      { fill: #fff176; }
        100%     { fill: #fff176; }
      }
      .bulb-glow {
        animation: glow-anim 7s infinite;
        opacity: 0.8;
      }
      @keyframes glow-anim {
        0%,16%   { opacity: 0.8; }
        21%,88%  { opacity: 0; }
        93%      { opacity: 0.8; }
        100%     { opacity: 0.8; }
      }
      .light-cone {
        animation: cone-anim 7s infinite;
        opacity: 0.65;
      }
      @keyframes cone-anim {
        0%,16%   { opacity: 0.65; }
        22%,88%  { opacity: 0; }
        93%      { opacity: 0.65; }
        100%     { opacity: 0.65; }
      }
      .rays {
        animation: rays-anim 7s infinite;
        opacity: 1;
      }
      @keyframes rays-anim {
        0%,16%   { opacity: 1; }
        22%,88%  { opacity: 0; }
        93%      { opacity: 1; }
        100%     { opacity: 1; }
      }
      .switch-lever {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: lever-off 7s infinite;
        transform: translateY(-12px);
      }
      @keyframes lever-off {
        0%,15%   { transform: translateY(-12px); }
        19%,88%  { transform: translateY(0px); }
        93%      { transform: translateY(-12px); }
        100%     { transform: translateY(-12px); }
      }
      .hand {
        animation: hand-press 7s ease-in-out infinite;
        transform: translate(280px,175px);
      }
      @keyframes hand-press {
        0%,11%   { transform: translate(280px,175px); }
        16%      { transform: translate(256px,152px); }
        21%      { transform: translate(256px,152px); }
        26%      { transform: translate(280px,175px); }
        100%     { transform: translate(280px,175px); }
      }
      .off-flash {
        animation: flash-off 7s infinite;
        opacity: 0;
      }
      @keyframes flash-off {
        0%,16.5% { opacity: 0; }
        17.5%    { opacity: 0.5; }
        19%      { opacity: 0; }
        100%     { opacity: 0; }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 1. Warm wall background -->
  <rect width="300" height="300" fill="#fff9e6" rx="20"/>

  <!-- 2. Ceiling strip -->
  <rect y="0" width="300" height="22" fill="#eeeeee"/>

  <!-- 3. Floor -->
  <rect y="265" width="300" height="35" fill="#8d6e63"/>
  <!-- Floor grain lines -->
  <line x1="0" y1="273" x2="300" y2="273" stroke="#7d5c53" stroke-width="1"/>
  <line x1="0" y1="281" x2="300" y2="281" stroke="#7d5c53" stroke-width="1"/>
  <line x1="0" y1="289" x2="300" y2="289" stroke="#7d5c53" stroke-width="1"/>
  <line x1="60" y1="265" x2="60" y2="300" stroke="#7d5c53" stroke-width="0.5"/>
  <line x1="140" y1="265" x2="140" y2="300" stroke="#7d5c53" stroke-width="0.5"/>
  <line x1="220" y1="265" x2="220" y2="300" stroke="#7d5c53" stroke-width="0.5"/>

  <!-- 4. Baseboard -->
  <rect y="263" width="300" height="5" fill="#6d4c41"/>

  <!-- 5. Picture frame on wall -->
  <rect x="185" y="65" width="70" height="55" fill="#8d6e63" rx="2"/>
  <rect x="189" y="69" width="62" height="47" fill="#c8e6c9"/>
  <!-- Simple painting detail -->
  <ellipse cx="220" cy="93" rx="18" ry="14" fill="#a5d6a7"/>
  <ellipse cx="220" cy="93" rx="10" ry="8" fill="#66bb6a"/>

  <!-- 6. Bookshelf -->
  <rect x="18" y="165" width="55" height="90" fill="#8d6e63" rx="2"/>
  <!-- Shelf planks -->
  <rect x="18" y="205" width="55" height="4" fill="#6d4c41"/>
  <rect x="18" y="245" width="55" height="4" fill="#6d4c41"/>
  <!-- Books on top shelf -->
  <rect x="22" y="175" width="10" height="28" fill="#ef5350" rx="1"/>
  <rect x="33" y="178" width="9" height="25" fill="#42a5f5" rx="1"/>
  <rect x="43" y="176" width="11" height="27" fill="#66bb6a" rx="1"/>
  <rect x="55" y="179" width="8" height="24" fill="#ffa726" rx="1"/>
  <!-- Books on bottom shelf -->
  <rect x="22" y="215" width="12" height="28" fill="#ab47bc" rx="1"/>
  <rect x="35" y="218" width="9" height="25" fill="#26c6da" rx="1"/>
  <rect x="45" y="216" width="10" height="27" fill="#d4e157" rx="1"/>

  <!-- 7. Light cone (starts visible) -->
  <polygon class="light-cone" points="130,92 170,92 210,265 90,265" fill="#fff9c4" opacity="0.45"/>

  <!-- 8. Ceiling light fixture -->
  <!-- Hanging wire -->
  <line x1="150" y1="22" x2="150" y2="52" stroke="#9e9e9e" stroke-width="2"/>
  <!-- Shade -->
  <polygon points="134,52 166,52 180,82 120,82" fill="#5d4037"/>
  <!-- Shade inside -->
  <polygon points="137,55 163,55 175,80 125,80" fill="#4e342e"/>
  <!-- Bulb outer glow (starts visible) -->
  <circle class="bulb-glow" cx="150" cy="88" r="20" fill="#fff9c4" opacity="0.8"/>
  <!-- Bulb (starts yellow) -->
  <circle class="bulb" cx="150" cy="88" r="10" fill="#fff176"/>

  <!-- 9. Light rays (start visible) -->
  <g class="rays" opacity="1">
    <line x1="150" y1="58" x2="150" y2="48" stroke="#ffe082" stroke-width="3" stroke-linecap="round"/>
    <line x1="140" y1="62" x2="133" y2="53" stroke="#ffe082" stroke-width="3" stroke-linecap="round"/>
    <line x1="134" y1="70" x2="124" y2="67" stroke="#ffe082" stroke-width="3" stroke-linecap="round"/>
    <line x1="160" y1="62" x2="167" y2="53" stroke="#ffe082" stroke-width="3" stroke-linecap="round"/>
    <line x1="166" y1="70" x2="176" y2="67" stroke="#ffe082" stroke-width="3" stroke-linecap="round"/>
    <line x1="150" y1="74" x2="150" y2="84" stroke="#ffe082" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Bright warm wash (light ON state) -->
  <rect class="bright-wash" width="300" height="300" fill="#fff8c0" rx="20" opacity="0.38"/>
  <!-- 10. Dark overlay (above room elements, below switch/hand) -->
  <rect class="dark-overlay" width="300" height="300" fill="#0d0d1e" rx="20" opacity="0"/>

  <!-- Off flash (above dark-overlay, below switch/hand) -->
  <rect class="off-flash" width="300" height="300" fill="#ffffff" rx="20" opacity="0"/>

  <!-- 11. Wall switch box -->
  <rect x="240" y="128" width="24" height="42" fill="#e0e0e0" rx="3"/>
  <rect x="245" y="132" width="14" height="34" fill="#bdbdbd" rx="2"/>

  <!-- 12. Switch lever (starts at ON position, top) -->
  <rect class="switch-lever" x="246" y="148" width="12" height="14" fill="#9e9e9e" rx="5"/>

  <!-- 13. Hand -->
  <g class="hand">
    <ellipse cx="0" cy="0" rx="12" ry="9" fill="#ffcc80"/>
    <rect x="-4" y="-18" width="7" height="14" fill="#ffcc80" rx="3"/>
    <rect x="4" y="-14" width="6" height="12" fill="#ffcc80" rx="3"/>
    <rect x="-13" y="-6" width="10" height="6" fill="#ffcc80" rx="3"/>
  </g>
</g>
</svg>
