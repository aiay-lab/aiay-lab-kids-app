<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <clipPath id="stream-clip">
      <rect x="171" y="150" width="12" height="96"/>
    </clipPath>
    <style>
      /* ======= 水が落ちる ======= */
      .drops-scroll {
        animation: drops-fall 0.55s linear infinite;
      }
      @keyframes drops-fall {
        from { transform: translateY(0); }
        to   { transform: translateY(24px); }
      }
      /* 蛇口ON/OFF */
      .faucet-water {
        animation: tap-on 8s ease-in-out infinite;
        opacity: 0;
      }
      @keyframes tap-on {
        0%,12%  { opacity: 0; }
        17%,82% { opacity: 1; }
        87%     { opacity: 0; }
        100%    { opacity: 0; }
      }

      /* ======= 手が上がってくる ======= */
      .hands-group {
        animation: hands-rise 8s ease-in-out infinite;
      }
      @keyframes hands-rise {
        0%,9%   { transform: translateY(130px); }
        18%,80% { transform: translateY(0); }
        89%     { transform: translateY(130px); }
        100%    { transform: translateY(130px); }
      }

      /* ======= こすり合わせ ======= */
      .hand-l {
        animation: rub-l 0.45s ease-in-out infinite alternate;
      }
      @keyframes rub-l {
        from { transform: translateX(-9px); }
        to   { transform: translateX(6px); }
      }
      .hand-r {
        animation: rub-r 0.45s ease-in-out infinite alternate;
      }
      @keyframes rub-r {
        from { transform: translateX(9px); }
        to   { transform: translateX(-6px); }
      }

      /* ======= 泡 ======= */
      .bubble { animation: bubble-up 1.6s ease-out infinite; opacity: 0; }
      .b1 { animation-delay: 0.0s; }
      .b2 { animation-delay: 0.55s; }
      .b3 { animation-delay: 1.1s; }
      @keyframes bubble-up {
        0%   { transform: translateY(0);    opacity: 0; }
        18%  { opacity: 0.9; }
        100% { transform: translateY(-48px); opacity: 0; }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- タイル壁 -->
  <rect width="300" height="300" fill="#f5f5f5" rx="20"/>
  <rect width="300" height="182" fill="#fafafa"/>
  <!-- タイル目地（横） -->
  <line x1="0" y1="61" x2="300" y2="61" stroke="#e0e0e0" stroke-width="1.5"/>
  <line x1="0" y1="122" x2="300" y2="122" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- タイル目地（縦） -->
  <line x1="75"  y1="0" x2="75"  y2="182" stroke="#e0e0e0" stroke-width="1.5"/>
  <line x1="150" y1="0" x2="150" y2="182" stroke="#e0e0e0" stroke-width="1.5"/>
  <line x1="225" y1="0" x2="225" y2="182" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- ソープディスペンサー（装飾） -->
  <rect x="236" y="130" width="26" height="52" fill="#80cbc4" rx="7"/>
  <rect x="242" y="122" width="14" height="12" fill="#80cbc4" rx="3"/>
  <circle cx="249" cy="136" r="5" fill="#4db6ac"/>
  <rect x="238" y="168" width="22" height="10" fill="#4db6ac" rx="3" opacity="0.6"/>

  <!-- カウンター -->
  <rect x="0" y="180" width="300" height="10" fill="#e0e0e0"/>
  <rect x="0" y="190" width="300" height="110" fill="#bdbdbd"/>

  <!-- 洗面ボウル外枠 -->
  <rect x="78" y="158" width="144" height="106" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="2.5" rx="12"/>
  <!-- 洗面ボウル内側（水色） -->
  <rect x="86" y="166" width="128" height="88" fill="#e3f2fd" rx="8"/>
  <!-- 排水口 -->
  <circle cx="150" cy="246" r="6.5" fill="#9e9e9e"/>
  <circle cx="150" cy="246" r="3.5" fill="#757575"/>

  <!-- 蛇口（アーチ型） -->
  <path d="M 150,168 L 150,114 Q 150,100 166,100 Q 182,100 182,114 L 182,150"
        fill="none" stroke="#b0bec5" stroke-width="14" stroke-linecap="round"/>
  <!-- レバー -->
  <rect x="155" y="95" width="22" height="8" fill="#78909c" rx="3"/>
  <!-- 先端キャップ -->
  <circle cx="182" cy="150" r="8" fill="#9e9e9e"/>
  <circle cx="182" cy="150" r="4.5" fill="#78909c"/>

  <!-- ===== 水（蛇口先端から落ちる） ===== -->
  <g class="faucet-water">
    <!-- 水柱（ベース） -->
    <rect x="179" y="150" width="6" height="96" fill="#64b5f6" rx="3" opacity="0.7"/>
    <!-- 流れる雫（クリップで切る） -->
    <g clip-path="url(#stream-clip)">
      <g class="drops-scroll">
        <ellipse cx="182" cy="126" rx="4" ry="6" fill="#90caf9" opacity="0.85"/>
        <ellipse cx="182" cy="150" rx="4" ry="6" fill="#90caf9" opacity="0.85"/>
        <ellipse cx="182" cy="174" rx="4" ry="6" fill="#90caf9" opacity="0.85"/>
        <ellipse cx="182" cy="198" rx="4" ry="6" fill="#90caf9" opacity="0.85"/>
        <ellipse cx="182" cy="222" rx="4" ry="6" fill="#90caf9" opacity="0.85"/>
        <ellipse cx="182" cy="246" rx="4" ry="6" fill="#90caf9" opacity="0.85"/>
      </g>
    </g>
    <!-- 水面の波紋 -->
    <ellipse cx="182" cy="248" rx="16" ry="5" fill="#64b5f6" opacity="0.35"/>
  </g>

  <!-- ===== 手グループ（下から出てくる） ===== -->
  <g class="hands-group">
    <!-- 右手（手前・明るい色） -->
    <g transform="translate(170, 228)">
      <g class="hand-r">
        <ellipse cx="0" cy="0" rx="24" ry="14" fill="#ffcc80"/>
        <rect x="-8"  y="-28" width="9" height="22" fill="#ffcc80" rx="4"/>
        <rect x="2"   y="-32" width="9" height="24" fill="#ffcc80" rx="4"/>
        <rect x="12"  y="-30" width="8" height="22" fill="#ffcc80" rx="4"/>
        <rect x="21"  y="-24" width="7" height="16" fill="#ffcc80" rx="3"/>
        <rect x="-21" y="-7"  width="14" height="9" fill="#ffcc80" rx="4"/>
      </g>
    </g>

    <!-- 左手（奥・少し暗い色） -->
    <g transform="translate(130, 228)">
      <g class="hand-l">
        <ellipse cx="0" cy="0" rx="24" ry="14" fill="#ffb74d"/>
        <rect x="0"   y="-28" width="9" height="22" fill="#ffb74d" rx="4"/>
        <rect x="-10" y="-32" width="9" height="24" fill="#ffb74d" rx="4"/>
        <rect x="-20" y="-30" width="8" height="22" fill="#ffb74d" rx="4"/>
        <rect x="-28" y="-24" width="7" height="16" fill="#ffb74d" rx="3"/>
        <rect x="8"   y="-7"  width="14" height="9" fill="#ffb74d" rx="4"/>
      </g>
    </g>

    <!-- 石けんの泡 -->
    <circle class="bubble b1" cx="148" cy="207" r="6"   fill="none" stroke="#80cbc4" stroke-width="2"/>
    <circle class="bubble b2" cx="160" cy="210" r="4.5" fill="none" stroke="#80cbc4" stroke-width="2"/>
    <circle class="bubble b3" cx="138" cy="209" r="7"   fill="none" stroke="#80cbc4" stroke-width="2"/>
  </g>
</g>
</svg>
