<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame">
      <rect width="300" height="300" rx="20"/>
    </clipPath>
    <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
    <linearGradient id="sea-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <linearGradient id="sand-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#f5c842"/>
    </linearGradient>
    <style>
      /* ======= 太陽の光線が回る ======= */
      .sun-rays {
        transform-box: fill-box; transform-origin: 50% 50%;
        animation: sun-spin 10s linear infinite;
      }
      @keyframes sun-spin { to { transform: rotate(360deg); } }

      .sun-core {
        transform-box: fill-box; transform-origin: 50% 50%;
        animation: sun-glow 3s ease-in-out infinite alternate;
      }
      @keyframes sun-glow {
        0%   { transform: scale(1);    }
        100% { transform: scale(1.07); }
      }

      /* ======= 雲が流れる ======= */
      .cloud-a {
        animation: cloud-a 22s linear infinite;
      }
      @keyframes cloud-a {
        0%   { transform: translateX(-180px); }
        100% { transform: translateX(350px); }
      }
      .cloud-b {
        animation: cloud-b 30s linear infinite;
      }
      @keyframes cloud-b {
        0%   { transform: translateX(350px); }
        100% { transform: translateX(-180px); }
      }

      /* ======= 波が流れる（3層） ======= */
      .wave-c {
        animation: wave-shift 7s linear infinite;
      }
      .wave-b {
        animation: wave-shift 4.8s linear infinite;
        animation-delay: -1.6s;
      }
      .wave-a {
        animation: wave-shift 3.2s linear infinite;
        animation-delay: -0.8s;
      }
      @keyframes wave-shift {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-150px); }
      }

      /* ======= 水面がきらきら ======= */
      .glint {
        transform-box: fill-box; transform-origin: 50% 50%;
        animation: glint-pop 2.5s ease-in-out infinite;
        opacity: 0;
      }
      .gl1 { animation-delay: 0.0s; }
      .gl2 { animation-delay: 0.6s; }
      .gl3 { animation-delay: 1.2s; }
      .gl4 { animation-delay: 1.8s; }
      .gl5 { animation-delay: 0.9s; }
      @keyframes glint-pop {
        0%,8%    { opacity: 0; transform: scale(0.3); }
        28%,65%  { opacity: 1; transform: scale(1); }
        88%,100% { opacity: 0; transform: scale(0.3); }
      }

      /* ======= かもめが飛ぶ ======= */
      .gull-a {
        animation: gull-a 11s linear infinite;
      }
      @keyframes gull-a {
        0%   { transform: translate(-50px, 88px); }
        100% { transform: translate(350px, 62px); }
      }
      .gull-b {
        animation: gull-b 15s linear infinite;
        animation-delay: -4s;
      }
      @keyframes gull-b {
        0%   { transform: translate(-50px, 108px); }
        100% { transform: translate(350px, 80px); }
      }

      /* ======= 魚がぴょんと飛び出す ======= */
      .fish-jump {
        animation: fish-pop 5s ease-in-out infinite;
        opacity: 0;
      }
      @keyframes fish-pop {
        0%,18%  { opacity: 0; transform: translateY(0) rotate(0deg); }
        22%     { opacity: 1; }
        34%     { opacity: 1; transform: translateY(-45px) rotate(-30deg); }
        46%     { opacity: 0.6; transform: translateY(-20px) rotate(30deg); }
        52%,100%{ opacity: 0; transform: translateY(0) rotate(0deg); }
      }

      /* ======= ビーチボールが転がる ======= */
      .beach-ball {
        transform-box: fill-box; transform-origin: 50% 50%;
        animation: ball-roll 8s linear infinite;
      }
      @keyframes ball-roll {
        0%   { transform: translateX(-50px) rotate(0deg); }
        100% { transform: translateX(320px) rotate(720deg); }
      }
    </style>
  </defs>

  <g clip-path="url(#frame)">

    <!-- ===== 空 ===== -->
    <rect width="300" height="300" fill="url(#sky-grad)"/>

    <!-- ===== 太陽 ===== -->
    <g transform="translate(64, 66)">
      <g class="sun-rays">
        <line x1="0"   y1="-42" x2="0"   y2="-57" stroke="#fdd835" stroke-width="5" stroke-linecap="round"/>
        <line x1="30"  y1="-30" x2="40"  y2="-40" stroke="#fdd835" stroke-width="5" stroke-linecap="round"/>
        <line x1="42"  y1="0"   x2="57"  y2="0"   stroke="#fdd835" stroke-width="5" stroke-linecap="round"/>
        <line x1="30"  y1="30"  x2="40"  y2="40"  stroke="#fdd835" stroke-width="5" stroke-linecap="round"/>
        <line x1="0"   y1="42"  x2="0"   y2="57"  stroke="#fdd835" stroke-width="5" stroke-linecap="round"/>
        <line x1="-30" y1="30"  x2="-40" y2="40"  stroke="#fdd835" stroke-width="5" stroke-linecap="round"/>
        <line x1="-42" y1="0"   x2="-57" y2="0"   stroke="#fdd835" stroke-width="5" stroke-linecap="round"/>
        <line x1="-30" y1="-30" x2="-40" y2="-40" stroke="#fdd835" stroke-width="5" stroke-linecap="round"/>
      </g>
      <g class="sun-core">
        <circle cx="0" cy="0" r="32" fill="#fdd835"/>
        <circle cx="0" cy="0" r="26" fill="#ffee58"/>
        <!-- にっこり顔 -->
        <circle cx="-7" cy="-2" r="3"   fill="#f9a825"/>
        <circle cx="7"  cy="-2" r="3"   fill="#f9a825"/>
        <path d="M -9,6 Q 0,15 9,6" stroke="#f9a825" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </g>
    </g>

    <!-- ===== 雲 ===== -->
    <g class="cloud-a">
      <g transform="translate(80, 42)">
        <ellipse cx="0"  cy="0"  rx="20" ry="14" fill="#fff" opacity="0.94"/>
        <ellipse cx="28" cy="-6" rx="27" ry="19" fill="#fff" opacity="0.94"/>
        <ellipse cx="58" cy="0"  rx="21" ry="14" fill="#fff" opacity="0.94"/>
        <ellipse cx="28" cy="10" rx="24" ry="10" fill="#fff" opacity="0.94"/>
      </g>
    </g>
    <g class="cloud-b">
      <g transform="translate(200, 75)">
        <ellipse cx="0"  cy="0"  rx="14" ry="10" fill="#fff" opacity="0.88"/>
        <ellipse cx="18" cy="-4" rx="19" ry="13" fill="#fff" opacity="0.88"/>
        <ellipse cx="38" cy="0"  rx="14" ry="10" fill="#fff" opacity="0.88"/>
        <ellipse cx="18" cy="7"  rx="16" ry="8"  fill="#fff" opacity="0.88"/>
      </g>
    </g>

    <!-- ===== 海の背景 ===== -->
    <rect x="0" y="158" width="300" height="142" fill="url(#sea-grad)"/>

    <!-- ===== 波（後ろ層・暗め） ===== -->
    <g class="wave-c">
      <path d="M -150,170 Q -112,157 -75,170 Q -38,183 0,170
               Q 38,157 75,170 Q 112,183 150,170
               Q 188,157 225,170 Q 262,183 300,170
               Q 338,157 375,170 Q 412,183 450,170
               L 450,300 L -150,300 Z"
            fill="#0277bd" opacity="0.6"/>
    </g>

    <!-- ===== 波（中層） ===== -->
    <g class="wave-b">
      <path d="M -150,182 Q -112,168 -75,182 Q -38,196 0,182
               Q 38,168 75,182 Q 112,196 150,182
               Q 188,168 225,182 Q 262,196 300,182
               Q 338,168 375,182 Q 412,196 450,182
               L 450,300 L -150,300 Z"
            fill="#0288d1" opacity="0.72"/>
    </g>

    <!-- ===== 波（前層・明るい＋しぶき） ===== -->
    <g class="wave-a">
      <path d="M -150,196 Q -112,181 -75,196 Q -38,211 0,196
               Q 38,181 75,196 Q 112,211 150,196
               Q 188,181 225,196 Q 262,211 300,196
               Q 338,181 375,196 Q 412,211 450,196
               L 450,300 L -150,300 Z"
            fill="#29b6f6"/>
      <!-- 波しぶき -->
      <path d="M -150,196 Q -112,181 -75,196 Q -38,211 0,196
               Q 38,181 75,196 Q 112,211 150,196
               Q 188,181 225,196 Q 262,211 300,196
               Q 338,181 375,196 Q 412,211 450,196"
            fill="none" stroke="#fff" stroke-width="3.5" opacity="0.6"/>
    </g>

    <!-- ===== 砂浜 ===== -->
    <path d="M 0,257 Q 60,248 120,254 Q 180,260 240,250 Q 270,245 300,252 L 300,300 L 0,300 Z"
          fill="url(#sand-grad)"/>
    <!-- 砂のきめ -->
    <path d="M 0,257 Q 60,248 120,254 Q 180,260 240,250 Q 270,245 300,252"
          fill="none" stroke="#ffd54f" stroke-width="2.5" opacity="0.6"/>
    <!-- 貝殻 -->
    <ellipse cx="52"  cy="272" rx="6" ry="4" fill="#fff" opacity="0.7" transform="rotate(-12,52,272)"/>
    <ellipse cx="220" cy="268" rx="5" ry="3" fill="#ffccbc" opacity="0.75" transform="rotate(8,220,268)"/>
    <ellipse cx="270" cy="276" rx="4" ry="3" fill="#fff" opacity="0.65" transform="rotate(-6,270,276)"/>

    <!-- ===== 水面のきらめき ===== -->
    <text class="glint gl1" x="48"  y="192" font-size="14" fill="#fff"    text-anchor="middle">✦</text>
    <text class="glint gl2" x="118" y="178" font-size="10" fill="#e1f5fe" text-anchor="middle">✦</text>
    <text class="glint gl3" x="192" y="185" font-size="13" fill="#fff"    text-anchor="middle">✦</text>
    <text class="glint gl4" x="258" y="174" font-size="9"  fill="#e1f5fe" text-anchor="middle">✦</text>
    <text class="glint gl5" x="88"  y="172" font-size="8"  fill="#fff"    text-anchor="middle">✦</text>

    <!-- ===== 魚がぴょん ===== -->
    <g transform="translate(230, 205)">
      <g class="fish-jump">
        <!-- 体 -->
        <ellipse cx="0" cy="0" rx="12" ry="6" fill="#ef5350" transform="rotate(-30)"/>
        <!-- 尾びれ -->
        <path d="M -10,-6 L -18,-12 L -14,-4 L -18,4 L -10,2 Z" fill="#e53935" transform="rotate(-30)"/>
        <!-- 目 -->
        <circle cx="5" cy="-2" r="2" fill="#fff" transform="rotate(-30)"/>
        <circle cx="5" cy="-2" r="1" fill="#111" transform="rotate(-30)"/>
      </g>
    </g>

    <!-- ===== かもめ ===== -->
    <g class="gull-a">
      <path d="M -12,0 Q -6,-6 0,-3 Q 6,-6 12,0"
            fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <g class="gull-b">
      <path d="M -9,0 Q -4.5,-5 0,-2.5 Q 4.5,-5 9,0"
            fill="none" stroke="#e3f2fd" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
    </g>

    <!-- ===== ビーチボール ===== -->
    <g transform="translate(0, 260)">
      <g class="beach-ball">
        <circle cx="0" cy="0" r="12" fill="#ff5722"/>
        <path d="M -12,0 A 12,12 0 0,1 12,0" fill="#fff"/>
        <path d="M -12,0 A 12,12 0 0,0 12,0" fill="#ff5722"/>
        <path d="M 0,-12 A 12,12 0 0,1 0,12" fill="#ffeb3b" opacity="0.7"/>
        <circle cx="0" cy="0" r="12" fill="none" stroke="#e64a19" stroke-width="1" opacity="0.5"/>
      </g>
    </g>

  </g>
</svg>
