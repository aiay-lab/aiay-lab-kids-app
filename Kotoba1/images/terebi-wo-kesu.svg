<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <clipPath id="screen-clip">
      <rect x="63" y="62" width="175" height="115" rx="2"/>
    </clipPath>
    <pattern id="scanlines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" y="0" fill="#000000" opacity="0.10"/>
    </pattern>
    <style>
      /* 電源ボタン：ON→OFF のみ */
      .power-btn {
        animation: power-anim 7s ease-in-out infinite;
      }
      @keyframes power-anim {
        0%,14%  { fill: #4caf50; }   /* ON（緑） */
        16%     { fill: #ef5350; }   /* 押した瞬間（赤） */
        20%,88% { fill: #424242; }   /* OFF */
        91%,100%{ fill: #4caf50; }   /* リセット用に戻す */
      }

      /* リモコンボタン：1回だけ光る */
      .remote-btn {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: remote-press 7s infinite;
      }
      @keyframes remote-press {
        0%,13%  { fill: #616161; transform: scale(1); }
        15%     { fill: #ef5350; transform: scale(1.4); }
        18%     { fill: #616161; transform: scale(1); }
        100%    { fill: #616161; }
      }

      /* 画面コンテンツ（ON → 消える） */
      .screen-content {
        animation: content-anim 7s infinite;
        opacity: 1;
      }
      @keyframes content-anim {
        0%,14%  { opacity: 1; }
        20%     { opacity: 0; }
        88%     { opacity: 0; }
        92%     { opacity: 1; }   /* リセット */
        100%    { opacity: 1; }
      }

      /* 暗い画面（OFF） */
      .screen-dark {
        animation: dark-anim 7s infinite;
        opacity: 0;
      }
      @keyframes dark-anim {
        0%,14%  { opacity: 0; }
        20%     { opacity: 1; }
        88%     { opacity: 1; }
        92%     { opacity: 0; }   /* リセット */
        100%    { opacity: 0; }
      }

      /* 消灯フラッシュ（消えるときの白い光） */
      .screen-off-flash {
        animation: off-flash 7s infinite;
        opacity: 0;
      }
      @keyframes off-flash {
        0%,15%  { opacity: 0; }
        17%     { opacity: 1; }
        19%     { opacity: 0; }
        100%    { opacity: 0; }
      }

      /* CRT消灯エフェクト（横一線になって消える） */
      .crt-collapse {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: crt-off 7s infinite;
        opacity: 0;
      }
      @keyframes crt-off {
        0%,16%  { transform: scale(1,   1);    opacity: 0; }
        18%     { transform: scale(1,   1);    opacity: 1; }
        20%     { transform: scale(1,   0.04); opacity: 1; }
        22%     { transform: scale(0.3, 0.04); opacity: 1; }
        24%     { transform: scale(0,   0.04); opacity: 0; }
        100%    { transform: scale(0,   0.04); opacity: 0; }
      }

      /* 画面周りのグロー（ONのとき） */
      .screen-glow {
        animation: glow-anim 7s infinite;
        opacity: 1;
      }
      @keyframes glow-anim {
        0%,14%  { opacity: 1; }
        20%     { opacity: 0; }
        88%     { opacity: 0; }
        92%     { opacity: 1; }
        100%    { opacity: 1; }
      }

      /* 部屋の暗転（TV消灯後）*/
      .room-overlay {
        animation: room-darken 7s ease-in-out infinite;
        opacity: 0;
        pointer-events: none;
      }
      @keyframes room-darken {
        0%,  14% { opacity: 0;    }   /* TV ON：明るい部屋 */
        26%      { opacity: 0.76; }   /* TV OFF：暗くなる */
        88%      { opacity: 0.76; }
        94%,100% { opacity: 0;    }   /* リセット */
      }

      /* 手：1回だけリモコンを押す */
      .hand {
        animation: hand-move 7s ease-in-out infinite;
        transform: translate(270px, 230px);
      }
      @keyframes hand-move {
        0%,10%  { transform: translate(270px, 230px); }
        15%     { transform: translate(248px, 205px); }
        20%     { transform: translate(248px, 205px); }
        25%     { transform: translate(270px, 230px); }
        100%    { transform: translate(270px, 230px); }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 壁 -->
  <rect width="300" height="300" fill="#fff9e6" rx="20"/>
  <rect y="218" width="300" height="6" fill="#e8e0d0"/>

  <!-- 床 -->
  <rect y="222" width="300" height="78" fill="#795548"/>
  <line x1="0" y1="240" x2="300" y2="240" stroke="#7b5e50" stroke-width="1.5" opacity="0.6"/>
  <line x1="0" y1="260" x2="300" y2="260" stroke="#7b5e50" stroke-width="1.5" opacity="0.6"/>
  <line x1="0" y1="280" x2="300" y2="280" stroke="#7b5e50" stroke-width="1.5" opacity="0.6"/>
  <line x1="80"  y1="222" x2="90"  y2="300" stroke="#7b5e50" stroke-width="1" opacity="0.4"/>
  <line x1="170" y1="222" x2="185" y2="300" stroke="#7b5e50" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="222" x2="265" y2="300" stroke="#7b5e50" stroke-width="1" opacity="0.4"/>

  <!-- TVラック -->
  <rect x="20" y="188" width="260" height="36" fill="#5d4037" rx="4"/>
  <rect x="20" y="188" width="260" height="7"  fill="#6d4c41" rx="3"/>
  <rect x="40"  y="224" width="18" height="14" fill="#4e342e" rx="2"/>
  <rect x="242" y="224" width="18" height="14" fill="#4e342e" rx="2"/>

  <!-- TV本体の光（ONのとき） -->
  <rect class="screen-glow" x="44" y="42" width="212" height="155"
        fill="#a5d6fa" rx="10" opacity="0.25"/>

  <!-- TV本体 -->
  <rect x="46" y="44" width="208" height="150" fill="#1a1a1a" rx="9"/>
  <rect x="46" y="172" width="208" height="22" fill="#111111"/>
  <rect x="46" y="188" width="208" height="6"  fill="#1a1a1a"/>

  <!-- アンテナ -->
  <line x1="110" y1="44" x2="88"  y2="14" stroke="#616161" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="190" y1="44" x2="212" y2="14" stroke="#616161" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="88"  cy="13" r="4.5" fill="#9e9e9e"/>
  <circle cx="212" cy="13" r="4.5" fill="#9e9e9e"/>

  <!-- ===== 画面エリア ===== -->
  <g clip-path="url(#screen-clip)">

    <!-- 画面コンテンツ（最初からON） -->
    <g class="screen-content">
      <rect x="63" y="62" width="175" height="68" fill="#42a5f5"/>
      <rect x="63" y="130" width="175" height="47" fill="#66bb6a"/>
      <ellipse cx="110" cy="131" rx="48" ry="16" fill="#81c784"/>
      <ellipse cx="210" cy="130" rx="38" ry="14" fill="#81c784"/>
      <circle cx="208" cy="89" r="19" fill="#fff176"/>
      <line x1="208" y1="64" x2="208" y2="58" stroke="#ffe082" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="208" y1="114" x2="208" y2="120" stroke="#ffe082" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="183" y1="89" x2="177" y2="89" stroke="#ffe082" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="233" y1="89" x2="239" y2="89" stroke="#ffe082" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="191" y1="71" x2="186" y2="66" stroke="#ffe082" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="225" y1="107" x2="230" y2="112" stroke="#ffe082" stroke-width="2.5" stroke-linecap="round"/>
      <ellipse cx="115" cy="88" rx="30" ry="14" fill="#ffffff" opacity="0.92"/>
      <ellipse cx="94"  cy="92" rx="17" ry="12" fill="#ffffff" opacity="0.92"/>
      <ellipse cx="134" cy="92" rx="17" ry="11" fill="#ffffff" opacity="0.92"/>
      <rect x="79" y="120" width="6" height="14" fill="#5d4037"/>
      <ellipse cx="82" cy="114" rx="14" ry="14" fill="#388e3c"/>
      <circle cx="130" cy="143" r="4" fill="#f48fb1"/>
      <circle cx="138" cy="140" r="3" fill="#fff176"/>
      <circle cx="145" cy="144" r="4" fill="#f48fb1"/>
      <rect x="63" y="62" width="175" height="115" fill="url(#scanlines)"/>
      <ellipse cx="108" cy="80" rx="36" ry="14" fill="#ffffff" opacity="0.06"/>
    </g>

    <!-- 消灯フラッシュ（白い光） -->
    <rect class="screen-off-flash" x="63" y="62" width="175" height="115" fill="#ffffff"/>

    <!-- CRT消灯エフェクト（横線になって消える） -->
    <rect class="crt-collapse" x="63" y="62" width="175" height="115" fill="#ffffff"/>

    <!-- 暗い画面（OFF） -->
    <rect class="screen-dark" x="63" y="62" width="175" height="115" fill="#0d0d0d"/>
  </g>

  <!-- 電源ボタン -->
  <circle class="power-btn" cx="150" cy="181" r="5.5" fill="#4caf50"/>
  <rect x="112" y="178" width="26" height="7" fill="#222222" rx="2"/>

  <!-- リモコン -->
  <rect x="220" y="196" width="22" height="42" fill="#37474f" rx="8"/>
  <rect x="223" y="199" width="16" height="11" fill="#263238" rx="2"/>
  <circle class="remote-btn" cx="231" cy="218" r="4.5" fill="#616161"/>
  <circle cx="231" cy="228" r="2.5" fill="#546e7a"/>
  <circle cx="225" cy="228" r="2.5" fill="#546e7a"/>
  <circle cx="237" cy="228" r="2.5" fill="#546e7a"/>

  <!-- 部屋の暗転オーバーレイ（TV OFF後）-->
  <rect class="room-overlay" width="300" height="300" fill="#0a0a1e" rx="20"/>

  <!-- 手 -->
  <g class="hand">
    <ellipse cx="0" cy="0" rx="12" ry="9" fill="#ffcc80"/>
    <rect x="-4" y="-18" width="7" height="14" fill="#ffcc80" rx="3"/>
    <rect x="4"  y="-14" width="6" height="12" fill="#ffcc80" rx="3"/>
    <rect x="-13" y="-6" width="10" height="6" fill="#ffcc80" rx="3"/>
  </g>
</g>
</svg>
