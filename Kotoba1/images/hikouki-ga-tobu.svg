<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* 飛行機が左から右へ横断→リセット（6秒ループ） */
      .plane-group {
        animation: fly-across 6s linear infinite;
      }
      @keyframes fly-across {
        0%       { transform: translate(-235px, 24px); opacity: 0; }
        8%       { opacity: 1; }
        70%      { transform: translate(230px, -16px); opacity: 1; }
        80%,100% { transform: translate(-235px, 24px); opacity: 0; }
      }

      /* 雲がゆっくり流れる */
      .cloud {
        animation: cloud-drift 24s linear infinite;
      }
      @keyframes cloud-drift {
        from { transform: translateX(0); }
        to   { transform: translateX(340px); }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 空（青） -->
  <rect width="300" height="300" fill="#64b5f6"/>
  <!-- 上空が少し濃い -->
  <rect width="300" height="90" fill="#1976d2" opacity="0.16"/>

  <!-- 地面（遠くの緑） -->
  <rect y="238" width="300" height="62" fill="#66bb6a"/>
  <path d="M 0,238 C 50,220 110,234 180,218 C 230,208 265,226 300,214 L 300,238 Z"
        fill="#81c784"/>
  <!-- 田んぼ/畑っぽい区画 -->
  <line x1="60"  y1="238" x2="58"  y2="300" stroke="#4caf50" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="238" x2="128" y2="300" stroke="#4caf50" stroke-width="1" opacity="0.5"/>
  <line x1="210" y1="238" x2="208" y2="300" stroke="#4caf50" stroke-width="1" opacity="0.5"/>
  <line x1="0"   y1="260" x2="300" y2="258" stroke="#4caf50" stroke-width="1" opacity="0.4"/>

  <!-- 雲1 -->
  <g class="cloud" style="animation-delay:-6s">
    <ellipse cx="-55" cy="70"  rx="42" ry="17" fill="white" opacity="0.88"/>
    <ellipse cx="-74" cy="78"  rx="24" ry="14" fill="white" opacity="0.88"/>
    <ellipse cx="-34" cy="78"  rx="28" ry="13" fill="white" opacity="0.88"/>
  </g>
  <!-- 雲2 -->
  <g class="cloud" style="animation-delay:-16s">
    <ellipse cx="110" cy="52"  rx="34" ry="14" fill="white" opacity="0.78"/>
    <ellipse cx="92"  cy="58"  rx="20" ry="11" fill="white" opacity="0.78"/>
    <ellipse cx="130" cy="58"  rx="22" ry="10" fill="white" opacity="0.78"/>
  </g>
  <!-- 雲3（大きめ・前景） -->
  <g class="cloud" style="animation-delay:-2s">
    <ellipse cx="-15" cy="45"  rx="54" ry="21" fill="white" opacity="0.92"/>
    <ellipse cx="-40" cy="56"  rx="30" ry="16" fill="white" opacity="0.92"/>
    <ellipse cx="10"  cy="56"  rx="34" ry="15" fill="white" opacity="0.92"/>
  </g>

  <!-- ===== 飛行機グループ ===== -->
  <g class="plane-group">

    <!-- 飛行機雲（機体後方から伸びる・グループ内） -->
    <line x1="92" y1="132" x2="52"  y2="134" stroke="white" stroke-width="4"   stroke-linecap="round" opacity="0.80"/>
    <line x1="92" y1="143" x2="50"  y2="145" stroke="white" stroke-width="3"   stroke-linecap="round" opacity="0.55"/>
    <line x1="92" y1="137" x2="28"  y2="140" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

    <!-- 主翼（後退翼・胴体底から自然に伸びる） -->
    <path d="M 165,150 L 88,173 L 104,179 L 205,154 Z" fill="#e0e0e0"/>
    <!-- 主翼ハイライト（前縁側） -->
    <path d="M 165,150 L 100,169 L 110,173 L 205,154 Z" fill="#f5f5f5" opacity="0.8"/>
    <!-- 翼端ウィングレット -->
    <path d="M 88,173 L 82,163 L 100,170 Z" fill="#bdbdbd"/>

    <!-- 水平尾翼 -->
    <path d="M 93,138 L 54,156 L 66,159 L 102,145 Z" fill="#e0e0e0"/>

    <!-- 垂直尾翼 -->
    <path d="M 92,134 L 92,104 L 112,118 L 112,133 Z" fill="white" stroke="#ddd" stroke-width="1"/>
    <!-- 垂直尾翼の青帯 -->
    <path d="M 94,132 L 94,108 L 108,120 L 110,131 Z" fill="#1565c0" opacity="0.75"/>

    <!-- 胴体（白・流線型） -->
    <path d="M 92,136
             C 96,124 120,119 150,119
             L 232,124
             C 246,124 256,130 256,137
             C 256,144 246,150 232,150
             L 150,155
             C 120,155 96,150 92,138 Z"
          fill="white" stroke="#ddd" stroke-width="1.5"/>

    <!-- 胴体の青ストライプ -->
    <line x1="112" y1="127" x2="245" y2="130" stroke="#1565c0" stroke-width="4" stroke-linecap="round" opacity="0.65"/>

    <!-- コックピット窓 -->
    <path d="M 228,122 C 240,122 254,128 254,134 C 240,131 226,133 226,122 Z"
          fill="#90caf9" opacity="0.85"/>

    <!-- 客室窓（5枚） -->
    <circle cx="175" cy="129" r="5" fill="#90caf9" opacity="0.90"/>
    <circle cx="190" cy="128" r="5" fill="#90caf9" opacity="0.90"/>
    <circle cx="205" cy="128" r="5" fill="#90caf9" opacity="0.90"/>
    <circle cx="220" cy="128" r="5" fill="#90caf9" opacity="0.90"/>
    <circle cx="160" cy="130" r="5" fill="#90caf9" opacity="0.90"/>

    <!-- 機首ノーズコーン -->
    <path d="M 232,124 L 255,137 L 232,150 C 240,147 246,143 246,137 C 246,131 240,127 232,124 Z"
          fill="#f5f5f5"/>

  </g>

  </g>
</svg>
