<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* 顔が小刻みに震える */
      .face-grp {
        transform-origin: 150px 158px;
        animation: cry-shake 0.18s ease-in-out infinite alternate;
      }
      @keyframes cry-shake {
        from { transform: translateX(-2px); }
        to   { transform: translateX(2px); }
      }

      /* 大粒の涙が落ちる */
      .tear {
        animation: tear-fall 2.2s ease-in infinite;
        opacity: 0;
      }
      .t1 { animation-delay: 0.0s; }
      .t2 { animation-delay: 0.6s; }
      .t3 { animation-delay: 1.1s; }
      .t4 { animation-delay: 0.3s; }
      .t5 { animation-delay: 1.6s; }
      .t6 { animation-delay: 0.9s; }
      @keyframes tear-fall {
        0%   { transform: translateY(0);     opacity: 0; }
        8%   { opacity: 1; }
        85%  { opacity: 0.8; }
        100% { transform: translateY(95px);  opacity: 0; }
      }

      /* ほっぺたが赤くなる（拍動） */
      .cheek-red {
        animation: cheek-pulse 0.9s ease-in-out infinite alternate;
      }
      @keyframes cheek-pulse {
        from { opacity: 0.50; }
        to   { opacity: 0.70; }
      }

      /* 目がまばたき（泣きながら） */
      .eye-grp {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: cry-blink 1.4s ease-in-out infinite;
      }
      @keyframes cry-blink {
        0%, 35%, 55%, 100% { transform: scaleY(1); }
        44%                 { transform: scaleY(0.08); }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- 背景（冷たい青灰色） -->
  <rect width="300" height="300" fill="#e3eaf0"/>
  <!-- 雨のような線 -->
  <line x1="50"  y1="0" x2="38"  y2="300" stroke="#b0bec5" stroke-width="1.2" opacity="0.40"/>
  <line x1="110" y1="0" x2="98"  y2="300" stroke="#b0bec5" stroke-width="1"   opacity="0.28"/>
  <line x1="170" y1="0" x2="158" y2="300" stroke="#b0bec5" stroke-width="1.2" opacity="0.35"/>
  <line x1="230" y1="0" x2="218" y2="300" stroke="#b0bec5" stroke-width="1"   opacity="0.30"/>
  <line x1="280" y1="0" x2="268" y2="300" stroke="#b0bec5" stroke-width="1"   opacity="0.25"/>

  <!-- ===== 顔グループ（震える） ===== -->
  <g class="face-grp">

    <!-- 耳 -->
    <circle cx="62"  cy="158" r="21" fill="#ffc27a"/>
    <circle cx="238" cy="158" r="21" fill="#ffc27a"/>

    <!-- 顔（少し赤みがかった） -->
    <circle cx="150" cy="158" r="88" fill="#ffd09d"/>
    <circle cx="150" cy="158" r="88" fill="#ff8a80" opacity="0.08"/>

    <!-- 髪 -->
    <path d="M 74,155
             C 67,130 64,100 73,78
             C 84,56 110,43 132,40
             C 140,38 146,37 150,39
             C 154,37 160,38 168,40
             C 190,43 216,56 227,78
             C 236,100 233,130 226,155
             C 220,133 215,112 205,104
             C 192,97 174,93 150,92
             C 126,93 108,97 95,104
             C 85,112 80,133 74,155 Z"
          fill="#3e2723"/>
    <path d="M 136,41 C 138,31 144,27 148,37" stroke="#3e2723" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <path d="M 150,39 C 153,29 159,26 161,36" stroke="#3e2723" stroke-width="5"   fill="none" stroke-linecap="round"/>
    <path d="M 124,47 C 125,37 131,33 133,43" stroke="#3e2723" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M 163,42 C 165,33 170,31 171,40" stroke="#3e2723" stroke-width="4"   fill="none" stroke-linecap="round"/>

    <!-- 眉毛（悲しい・内側が大きく上がる） -->
    <path d="M 100,114 Q 120,103 138,113" stroke="#5d3a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 162,113 Q 180,103 200,114" stroke="#5d3a1a" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- 目（まばたきあり・ちゃんと黒目入り） -->
    <!-- 左目 -->
    <g class="eye-grp">
      <circle cx="121" cy="148" r="19" fill="white"/>
      <circle cx="121" cy="150" r="13" fill="#3e2723"/>
      <circle cx="121" cy="150" r="9"  fill="#1a1a1a"/>
      <circle cx="116" cy="145" r="4"  fill="white"/>
      <circle cx="127" cy="153" r="2"  fill="white" opacity="0.7"/>
      <!-- 下まぶた（涙でうるうる） -->
      <path d="M 103,161 Q 121,170 139,161" stroke="#5dbcd2" stroke-width="2.5" fill="none" opacity="0.7"/>
    </g>
    <!-- 右目 -->
    <g class="eye-grp">
      <circle cx="179" cy="148" r="19" fill="white"/>
      <circle cx="179" cy="150" r="13" fill="#3e2723"/>
      <circle cx="179" cy="150" r="9"  fill="#1a1a1a"/>
      <circle cx="174" cy="145" r="4"  fill="white"/>
      <circle cx="185" cy="153" r="2"  fill="white" opacity="0.7"/>
      <path d="M 161,161 Q 179,170 197,161" stroke="#5dbcd2" stroke-width="2.5" fill="none" opacity="0.7"/>
    </g>

    <!-- 涙だまり（目の下） -->
    <ellipse cx="121" cy="167" rx="14" ry="6" fill="#90caf9" opacity="0.55"/>
    <ellipse cx="179" cy="167" rx="14" ry="6" fill="#90caf9" opacity="0.55"/>

    <!-- 鼻（真っ赤） -->
    <circle cx="145" cy="178" r="4" fill="#ef5350" opacity="0.80"/>
    <circle cx="155" cy="178" r="4" fill="#ef5350" opacity="0.80"/>

    <!-- ほっぺた（赤く拍動） -->
    <circle class="cheek-red" cx="96"  cy="185" r="26" fill="#ef9a9a" opacity="0.55"/>
    <circle class="cheek-red" cx="204" cy="185" r="26" fill="#ef9a9a" opacity="0.55"/>

    <!-- 口（∩アーチ型・悲しい泣き顔） -->
    <!-- 口の外枠（∩アーチ＝悲しい口角） -->
    <path d="M 112,220 Q 150,202 188,220 L 186,242 Q 150,260 114,242 Z"
          fill="#5d3a1a"/>
    <!-- 口の内側 -->
    <path d="M 114,221 Q 150,204 186,221 L 184,240 Q 150,257 116,240 Z"
          fill="#c62828"/>
    <!-- 下の歯（泣き顔の下唇） -->
    <rect x="124" y="236" width="52" height="12" rx="5" fill="white"/>
    <!-- 舌 -->
    <ellipse cx="150" cy="250" rx="20" ry="10" fill="#ef5350"/>

  </g><!-- /face-grp -->

  <!-- ===== 大粒の涙（顔グループ外・真下に落ちる） ===== -->
  <ellipse class="tear t1" cx="109" cy="172" rx="7"   ry="11"  fill="#42a5f5"/>
  <ellipse class="tear t2" cx="117" cy="169" rx="5"   ry="8"   fill="#64b5f6"/>
  <ellipse class="tear t3" cx="111" cy="175" rx="4"   ry="7"   fill="#90caf9"/>
  <ellipse class="tear t4" cx="191" cy="172" rx="7"   ry="11"  fill="#42a5f5"/>
  <ellipse class="tear t5" cx="183" cy="169" rx="5"   ry="8"   fill="#64b5f6"/>
  <ellipse class="tear t6" cx="189" cy="175" rx="4"   ry="7"   fill="#90caf9"/>

  </g>
</svg>
