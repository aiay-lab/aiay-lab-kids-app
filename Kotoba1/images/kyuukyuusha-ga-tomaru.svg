<?xml version="1.0" encoding="UTF-8"?>
<!--
  救急車が止まる
  演出: 左から走ってきた救急車がサイレンを鳴らしながら減速→停車。
        スキッドマークが現れ、しばらく後に右へ走り去る。8秒ループ。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="frame"><rect width="300" height="300" rx="20"/></clipPath>
    <style>
      /* === 救急車の移動 (8秒ループ) ===
         0-30% : 左から進入・減速
         30-68%: 停車
         68-82%: 右へ退場
         82-100%: 画面外（ループ待機）
      */
      .amb {
        animation: amb-arrive 8s linear infinite;
      }
      @keyframes amb-arrive {
        0%    { transform: translateX(-310px); }
        10%   { transform: translateX(-195px); }
        20%   { transform: translateX(-72px);  }
        25%   { transform: translateX(-16px);  }
        28%   { transform: translateX(4px);    }  /* オーバーシュート */
        31%   { transform: translateX(0px);    }  /* 停止 */
        68%   { transform: translateX(0px);    }  /* 停車中 */
        80%   { transform: translateX(310px);  }  /* 退場 */
        100%  { transform: translateX(310px);  }
      }

      /* 車輪の回転 (8秒に同期して停車中は止まる) */
      .wheel {
        transform-box: fill-box;
        transform-origin: 50% 50%;
        animation: amb-wheel 8s linear infinite;
      }
      @keyframes amb-wheel {
        0%    { transform: rotate(0deg);    }
        30%   { transform: rotate(1260deg); }  /* 進入中: 3.5回転 */
        68%   { transform: rotate(1260deg); }  /* 停車中: 静止 */
        82%   { transform: rotate(1620deg); }  /* 退場中: 1回転 */
        100%  { transform: rotate(1620deg); }  /* ≡ 180deg でも目立たない */
      }

      /* サイレン赤 */
      .siren-r {
        animation: sir-r 0.45s linear infinite;
      }
      @keyframes sir-r {
        0%,48%   { opacity: 1; }
        50%,100% { opacity: 0.15; }
      }
      /* サイレン白（交互） */
      .siren-w {
        animation: sir-w 0.45s linear 0.225s infinite;
      }
      @keyframes sir-w {
        0%,48%   { opacity: 1; }
        50%,100% { opacity: 0.15; }
      }

      /* スキッドマーク：停車後に出現し、退場後も残る */
      .skid {
        animation: skid-show 8s linear infinite;
      }
      @keyframes skid-show {
        0%,28%   { opacity: 0; }
        33%      { opacity: 0.65; }
        94%      { opacity: 0.65; }
        100%     { opacity: 0; }
      }
    </style>
  </defs>
  <g clip-path="url(#frame)">

  <!-- ===== 背景: 空 ===== -->
  <rect width="300" height="300" fill="#90caf9" rx="20"/>
  <rect width="300" height="140" fill="#64b5f6" opacity="0.35" rx="20"/>
  <!-- 白雲 -->
  <ellipse cx="64"  cy="52" rx="40" ry="19" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="46"  cy="59" rx="25" ry="16" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="82"  cy="60" rx="22" ry="15" fill="#ffffff" opacity="0.9"/>
  <ellipse cx="228" cy="42" rx="46" ry="21" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="208" cy="50" rx="28" ry="17" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="250" cy="51" rx="26" ry="15" fill="#ffffff" opacity="0.85"/>

  <!-- 遠景: 建物 -->
  <rect x="18"  y="145" width="44" height="115" fill="#90a4ae" rx="2"/>
  <rect x="22"  y="138" width="36" height="12"  fill="#78909c" rx="2"/>
  <rect x="24"  y="152" width="9"  height="11"  fill="#b3e5fc" opacity="0.65"/>
  <rect x="40"  y="152" width="9"  height="11"  fill="#b3e5fc" opacity="0.65"/>
  <rect x="24"  y="172" width="9"  height="11"  fill="#b3e5fc" opacity="0.65"/>
  <rect x="40"  y="172" width="9"  height="11"  fill="#b3e5fc" opacity="0.65"/>
  <rect x="238" y="152" width="52" height="108" fill="#90a4ae" rx="2"/>
  <rect x="244" y="144" width="40" height="13"  fill="#78909c" rx="2"/>
  <rect x="246" y="160" width="9"  height="11"  fill="#b3e5fc" opacity="0.65"/>
  <rect x="262" y="160" width="9"  height="11"  fill="#b3e5fc" opacity="0.65"/>
  <rect x="278" y="160" width="9"  height="11"  fill="#b3e5fc" opacity="0.65"/>
  <rect x="246" y="180" width="9"  height="11"  fill="#b3e5fc" opacity="0.65"/>
  <rect x="262" y="180" width="9"  height="11"  fill="#b3e5fc" opacity="0.65"/>
  <rect x="278" y="180" width="9"  height="11"  fill="#b3e5fc" opacity="0.65"/>

  <!-- 歩道 -->
  <rect y="258" width="300" height="42" fill="#78909c"/>
  <rect y="258" width="300" height="7"  fill="#9e9e9e"/>

  <!-- 道路 -->
  <rect y="244" width="300" height="16" fill="#546e7a"/>

  <!-- 道路センターライン（黄） -->
  <rect x="0"   y="250" width="42" height="4" rx="2" fill="#ffee58"/>
  <rect x="58"  y="250" width="42" height="4" rx="2" fill="#ffee58"/>
  <rect x="116" y="250" width="42" height="4" rx="2" fill="#ffee58"/>
  <rect x="174" y="250" width="42" height="4" rx="2" fill="#ffee58"/>
  <rect x="232" y="250" width="42" height="4" rx="2" fill="#ffee58"/>

  <!-- スキッドマーク（後輪・前輪の停止位置） -->
  <rect class="skid" x="68"  y="256" width="30" height="3" rx="1.5" fill="#1a1a1a"/>
  <rect class="skid" x="172" y="256" width="30" height="3" rx="1.5" fill="#1a1a1a"/>

  <!-- ===== 救急車グループ ===== -->
  <g class="amb">

    <!-- 車体シャドウ -->
    <ellipse cx="150" cy="261" rx="94" ry="5.5" fill="#000" opacity="0.10"/>

    <!-- サイレンバー本体 -->
    <rect x="106" y="161" width="88" height="18" rx="4" fill="#b71c1c"/>
    <!-- サイレンライト (赤・白・赤) -->
    <circle class="siren-r" cx="122" cy="170" r="8" fill="#ef5350"/>
    <circle class="siren-w" cx="150" cy="170" r="8" fill="#ffffff"/>
    <circle class="siren-r" cx="178" cy="170" r="8" fill="#ef5350" style="animation-delay:0.15s"/>
    <!-- サイレン光のにじみ -->
    <circle class="siren-r" cx="122" cy="170" r="14" fill="#ef5350" opacity="0.18"/>
    <circle class="siren-r" cx="178" cy="170" r="14" fill="#ef5350" opacity="0.18" style="animation-delay:0.15s"/>

    <!-- 屋根 -->
    <rect x="78" y="177" width="152" height="20" rx="5" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1.5"/>

    <!-- 車体（白） -->
    <rect x="64" y="194" width="172" height="50" rx="5" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>

    <!-- オレンジストライプ -->
    <rect x="72" y="218" width="156" height="14" fill="#ef6c00"/>
    <!-- ストライプのエッジ線 -->
    <line x1="72"  y1="218" x2="228" y2="218" stroke="#e65100" stroke-width="1"/>
    <line x1="72"  y1="232" x2="228" y2="232" stroke="#e65100" stroke-width="1"/>

    <!-- キャブ区切り線 -->
    <line x1="172" y1="194" x2="172" y2="244" stroke="#bdbdbd" stroke-width="2"/>

    <!-- 後部窓 -->
    <rect x="74"  y="200" width="24" height="28" rx="2" fill="#b3e5fc" opacity="0.9"/>
    <!-- ドア線 -->
    <line x1="118" y1="194" x2="118" y2="244" stroke="#e0e0e0" stroke-width="1.2"/>

    <!-- 赤十字マーク -->
    <rect x="138" y="198" width="10" height="28" rx="2" fill="#e53935"/>
    <rect x="128" y="208" width="30" height="10" rx="2" fill="#e53935"/>

    <!-- フロントガラス -->
    <rect x="178" y="200" width="34" height="34" rx="2" fill="#b3e5fc" opacity="0.9"/>

    <!-- フロント面 -->
    <rect x="228" y="194" width="10" height="50" rx="3" fill="#eeeeee" stroke="#e0e0e0" stroke-width="1"/>
    <!-- ヘッドライト -->
    <ellipse cx="232" cy="227" rx="5" ry="6" fill="#fff9c4"/>
    <ellipse cx="232" cy="227" rx="3" ry="4" fill="#ffee58"/>

    <!-- フロントバンパー -->
    <rect x="224" y="237" width="16" height="7" rx="2" fill="#bdbdbd"/>

    <!-- リア面 -->
    <rect x="62"  y="194" width="8"  height="50" rx="2" fill="#eeeeee" stroke="#e0e0e0" stroke-width="1"/>
    <!-- テールライト上 -->
    <rect x="63"  y="206" width="5"  height="12" rx="1" fill="#ef5350"/>
    <!-- テールライト下（バック） -->
    <rect x="63"  y="224" width="5"  height="8"  rx="1" fill="#ffee58"/>

    <!-- リアバンパー -->
    <rect x="60"  y="237" width="10" height="7"  rx="2" fill="#bdbdbd"/>

    <!-- 前輪 -->
    <g class="wheel">
      <circle cx="200" cy="246" r="14" fill="#37474f"/>
      <circle cx="200" cy="246" r="8"  fill="#546e7a"/>
      <line x1="200" y1="232" x2="200" y2="260" stroke="#78909c" stroke-width="2"/>
      <line x1="186" y1="246" x2="214" y2="246" stroke="#78909c" stroke-width="2"/>
      <circle cx="200" cy="246" r="4"  fill="#78909c"/>
    </g>

    <!-- 後輪 -->
    <g class="wheel">
      <circle cx="96"  cy="246" r="14" fill="#37474f"/>
      <circle cx="96"  cy="246" r="8"  fill="#546e7a"/>
      <line x1="96"  y1="232" x2="96"  y2="260" stroke="#78909c" stroke-width="2"/>
      <line x1="82"  y1="246" x2="110" y2="246" stroke="#78909c" stroke-width="2"/>
      <circle cx="96"  cy="246" r="4"  fill="#78909c"/>
    </g>

  </g><!-- end amb -->

</g>
</svg>
